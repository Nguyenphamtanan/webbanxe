<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="aiChatbox">
    <style>
        .ai-chat-toggle {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 62px;
            height: 62px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #2f6bff, #6fa2ff);
            color: #fff;
            font-size: 1.35rem;
            box-shadow: 0 16px 36px rgba(47,107,255,0.35);
            z-index: 1400;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .ai-chat-toggle:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 20px 42px rgba(47,107,255,0.42);
        }

        .ai-chatbox {
            position: fixed;
            right: 24px;
            bottom: 98px;
            width: 380px;
            max-width: calc(100vw - 24px);
            height: 560px;
            max-height: calc(100vh - 140px);
            display: none;
            flex-direction: column;
            border-radius: 24px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(18,24,34,0.98), rgba(10,15,24,0.98));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 28px 80px rgba(0,0,0,0.40);
            backdrop-filter: blur(12px);
            z-index: 1400;
        }

        .ai-chatbox.open {
            display: flex;
        }

        .ai-chat-header {
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(135deg, rgba(47,107,255,0.18), rgba(255,255,255,0.02));
        }

        .ai-chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ai-chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: linear-gradient(135deg, #2f6bff, #6fa2ff);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 10px 22px rgba(47,107,255,0.28);
        }

        .ai-chat-title {
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            margin: 0;
        }

        .ai-chat-sub {
            margin: 2px 0 0;
            font-size: 0.84rem;
            color: #b8c2d1;
        }

        .ai-chat-close {
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .ai-chat-close:hover {
            background: rgba(255,255,255,0.08);
        }

        .ai-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background:
                radial-gradient(circle at top left, rgba(47,107,255,0.08), transparent 24%),
                transparent;
        }

        .ai-chat-empty {
            margin: auto 0;
            text-align: center;
            color: #9ca3af;
            line-height: 1.8;
            font-size: 0.94rem;
        }

        .ai-bubble-row {
            display: flex;
        }

        .ai-bubble-row.user {
            justify-content: flex-end;
        }

        .ai-bubble-row.bot {
            justify-content: flex-start;
        }

        .ai-bubble {
            max-width: 85%;
            padding: 12px 14px;
            border-radius: 18px;
            line-height: 1.65;
            font-size: 0.94rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .ai-bubble.user {
            background: linear-gradient(135deg, #2f6bff, #5d8eff);
            color: #fff;
            border-bottom-right-radius: 8px;
            box-shadow: 0 10px 22px rgba(47,107,255,0.24);
        }

        .ai-bubble.bot {
            background: rgba(255,255,255,0.05);
            color: #eef2f7;
            border: 1px solid rgba(255,255,255,0.08);
            border-bottom-left-radius: 8px;
        }

        .ai-chat-suggestions {
            padding: 0 18px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .ai-suggestion-btn {
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            color: #dbe4ee;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.84rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .ai-suggestion-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .ai-chat-input-wrap {
            padding: 14px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
        }

        .ai-chat-form {
            display: flex;
            gap: 10px;
            align-items: end;
        }

        .ai-chat-textarea {
            flex: 1;
            min-height: 50px;
            max-height: 120px;
            resize: none;
            border-radius: 16px;
            padding: 12px 14px;
            background: #0d1319;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.10);
            outline: none;
            line-height: 1.5;
        }

        .ai-chat-textarea:focus {
            border-color: #2f6bff;
            box-shadow: 0 0 0 0.18rem rgba(47,107,255,0.18);
        }

        .ai-chat-send {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #2f6bff, #5d8eff);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(47,107,255,0.24);
            transition: 0.2s ease;
        }

        .ai-chat-send:hover {
            transform: translateY(-1px);
        }

        .ai-chat-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .ai-chat-loading {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #b8c2d1;
            font-size: 0.9rem;
        }

        .ai-chat-loading span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #b8c2d1;
            animation: aiDot 1.2s infinite ease-in-out;
        }

        .ai-chat-loading span:nth-child(2) { animation-delay: 0.15s; }
        .ai-chat-loading span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes aiDot {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 575.98px) {
            .ai-chat-toggle {
                right: 16px;
                bottom: 16px;
            }

            .ai-chatbox {
                right: 12px;
                left: 12px;
                bottom: 88px;
                width: auto;
                height: 70vh;
            }
        }
    </style>

    <button class="ai-chat-toggle" id="aiChatToggle" type="button" title="Mở AI Chat">
        <i class="bi bi-stars"></i>
    </button>

    <div class="ai-chatbox" id="aiChatbox">
        <div class="ai-chat-header">
            <div class="ai-chat-header-left">
                <div class="ai-chat-avatar">
                    <i class="bi bi-robot"></i>
                </div>
                <div>
                    <h3 class="ai-chat-title">AI tư vấn xe</h3>
                    <p class="ai-chat-sub">Hỏi về xe, giá, nhu cầu sử dụng</p>
                </div>
            </div>

            <button class="ai-chat-close" id="aiChatClose" type="button">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <div class="ai-chat-messages" id="aiChatMessages">
            <div class="ai-chat-empty" id="aiChatEmpty">
                Xin chào 👋<br>
                Tôi có thể gợi ý xe phù hợp theo nhu cầu của bạn.
            </div>
        </div>

        <div class="ai-chat-suggestions">
            <button class="ai-suggestion-btn" type="button" onclick="sendSuggestion('Xe nào phù hợp đi học hằng ngày?')">
                Xe đi học
            </button>
            <button class="ai-suggestion-btn" type="button" onclick="sendSuggestion('Xe nào tiết kiệm xăng?')">
                Tiết kiệm xăng
            </button>
            <button class="ai-suggestion-btn" type="button" onclick="sendSuggestion('Xe nào phù hợp đi đường dài?')">
                Đi đường dài
            </button>
            <button class="ai-suggestion-btn" type="button" onclick="sendSuggestion('Tư vấn xe tay ga cho nữ')">
                Xe tay ga
            </button>
        </div>

        <div class="ai-chat-input-wrap">
            <form class="ai-chat-form" id="aiChatForm">
                <textarea
                        id="aiChatInput"
                        class="ai-chat-textarea"
                        placeholder="Nhập câu hỏi của bạn..."
                        rows="1"></textarea>

                <button class="ai-chat-send" id="aiChatSend" type="submit">
                    <i class="bi bi-send-fill"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const aiChatToggle = document.getElementById("aiChatToggle");
        const aiChatbox = document.getElementById("aiChatbox");
        const aiChatClose = document.getElementById("aiChatClose");
        const aiChatForm = document.getElementById("aiChatForm");
        const aiChatInput = document.getElementById("aiChatInput");
        const aiChatMessages = document.getElementById("aiChatMessages");
        const aiChatSend = document.getElementById("aiChatSend");
        const aiChatEmpty = document.getElementById("aiChatEmpty");

        function toggleAiChat(forceOpen = null) {
            const shouldOpen = forceOpen !== null ? forceOpen : !aiChatbox.classList.contains("open");
            aiChatbox.classList.toggle("open", shouldOpen);

            if (shouldOpen) {
                setTimeout(() => aiChatInput.focus(), 100);
            }
        }

        function appendMessage(role, text) {
            if (aiChatEmpty) {
                aiChatEmpty.style.display = "none";
            }

            const row = document.createElement("div");
            row.className = `ai-bubble-row ${role}`;

            const bubble = document.createElement("div");
            bubble.className = `ai-bubble ${role}`;
            bubble.textContent = text;

            row.appendChild(bubble);
            aiChatMessages.appendChild(row);
            aiChatMessages.scrollTop = aiChatMessages.scrollHeight;
        }

        function appendLoading() {
            const row = document.createElement("div");
            row.className = "ai-bubble-row bot";
            row.id = "aiChatLoadingRow";

            const bubble = document.createElement("div");
            bubble.className = "ai-bubble bot";
            bubble.innerHTML = `
                <div class="ai-chat-loading">
                    <span></span><span></span><span></span>
                </div>
            `;

            row.appendChild(bubble);
            aiChatMessages.appendChild(row);
            aiChatMessages.scrollTop = aiChatMessages.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById("aiChatLoadingRow");
            if (loading) loading.remove();
        }

        async function sendAiMessage(message) {
            const content = (message || "").trim();
            if (!content) return;

            appendMessage("user", content);
            aiChatInput.value = "";
            aiChatSend.disabled = true;
            appendLoading();

            try {
                const response = await fetch("/api/ai-chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: content })
                });

                const data = await response.json();
                removeLoading();

                if (!response.ok) {
                    appendMessage("bot", data.message || "Không thể trả lời lúc này.");
                    return;
                }

                appendMessage("bot", data.reply || "Không có phản hồi.");
            } catch (error) {
                console.error(error);
                removeLoading();
                appendMessage("bot", "Có lỗi xảy ra khi kết nối AI.");
            } finally {
                aiChatSend.disabled = false;
                aiChatMessages.scrollTop = aiChatMessages.scrollHeight;
            }
        }

        function sendSuggestion(text) {
            toggleAiChat(true);
            sendAiMessage(text);
        }

        aiChatToggle.addEventListener("click", () => toggleAiChat());
        aiChatClose.addEventListener("click", () => toggleAiChat(false));

        aiChatForm.addEventListener("submit", async function (e) {
            e.preventDefault();
            await sendAiMessage(aiChatInput.value);
        });

        aiChatInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                aiChatForm.dispatchEvent(new Event("submit"));
            }
        });
    </script>
</div>

</body>
</html>
