<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | WEB BÁN XE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #050816;
            color: #fff;
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            position: relative;
        }

        .video-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

.video-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(0, 0, 0, 0.80);
}

.auth-page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 32px 24px;
}

        .auth-container {
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 520px;
    gap: 160px;
    align-items: center;
}

        .auth-left {
    padding: 0 10px 20px 10px;
}
        .brand-mark {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-size: 34px;
            font-weight: 800;
            color: #fff;
        }

        .auth-left h1 {
            font-size: clamp(44px, 6vw, 76px);
            line-height: 1.02;
            font-weight: 800;
            margin-bottom: 18px;
            letter-spacing: -1.5px;
        }

        .auth-left p {
            font-size: 22px;
            max-width: 620px;
            color: rgba(255,255,255,0.82);
            margin-bottom: 0;
        }

        .auth-right {
            display: flex;
            justify-content: center;
        }

        .auth-card {
            width: 100%;
            max-width: 520px;
            padding: 42px 38px 32px;
            border-radius: 32px;
            background: rgba(15, 18, 28, 0.72);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
        }

        .auth-title {
            font-size: 50px;
            font-weight: 800;
            line-height: 1.05;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .auth-subtitle {
            color: rgba(255,255,255,0.7);
            margin-bottom: 28px;
            font-size: 17px;
        }

        .alert-custom {
            border-radius: 16px;
            border: 1px solid rgba(255, 99, 99, 0.22);
            background: rgba(255, 82, 82, 0.12);
            color: #ffd1d1;
            padding: 12px 14px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 16px;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 18px;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            color: rgba(255,255,255,0.7);
            pointer-events: none;
        }

        .form-control.custom-input {
            height: 64px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.08);
            color: #fff;
            padding-left: 56px;
            padding-right: 18px;
            font-size: 17px;
            box-shadow: none;
        }

        .form-control.custom-input::placeholder {
            color: rgba(255,255,255,0.48);
        }

        .form-control.custom-input:focus {
            background: rgba(255,255,255,0.10);
            border-color: rgba(67, 120, 255, 0.9);
            color: #fff;
            box-shadow: 0 0 0 4px rgba(67, 120, 255, 0.18);
        }

        .form-check-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 10px 0 24px;
            color: rgba(255,255,255,0.8);
            font-size: 15px;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }

        .form-check-input {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.25);
            background-color: rgba(255,255,255,0.06);
            box-shadow: none !important;
        }

        .form-check-input:checked {
            background-color: #2f6bff;
            border-color: #2f6bff;
        }

        .auth-link {
            color: #9db8ff;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-link:hover {
            color: #c5d5ff;
        }

        .btn-login {
            width: 100%;
            height: 64px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(90deg, #2f6bff 0%, #3f7cff 100%);
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            transition: all 0.25s ease;
            box-shadow: 0 12px 30px rgba(47, 107, 255, 0.28);
        }

        .btn-login:hover {
            transform: translateY(-1px);
            background: linear-gradient(90deg, #2763f3 0%, #3c77f1 100%);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 26px 0 18px;
            color: rgba(255,255,255,0.52);
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            justify-content: center;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .google-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 26px;
        }

        .google-btn {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 10px 24px rgba(0,0,0,0.22);
            transition: all 0.25s ease;
        }

        .google-btn:hover {
            transform: translateY(-2px) scale(1.02);
        }

        .google-btn span {
            font-size: 28px;
            font-weight: 700;
            background: conic-gradient(from 0deg, #ea4335 0 25%, #fbbc05 25% 50%, #34a853 50% 75%, #4285f4 75% 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bottom-text {
            text-align: center;
            color: rgba(255,255,255,0.74);
            font-size: 16px;
            margin-bottom: 0;
        }

        .bottom-text a {
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
        }

        .bottom-text a:hover {
            color: #c9d9ff;
        }

        @media (max-width: 992px) {
            .auth-container {
                grid-template-columns: 1fr;
                gap: 28px;
            }

            .auth-left {
                display: none;
            }

            .auth-card {
                max-width: 100%;
                padding: 34px 24px 28px;
                border-radius: 26px;
            }

            .auth-title {
                font-size: 38px;
            }
        }

        @media (max-width: 576px) {
            .auth-page {
                padding: 18px 14px;
            }

            .auth-card {
                padding: 28px 18px 24px;
                border-radius: 24px;
            }

            .auth-title {
                font-size: 32px;
            }

            .auth-subtitle {
                font-size: 15px;
            }

            .form-control.custom-input,
            .btn-login {
                height: 58px;
            }

            .form-check-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<video class="video-bg" autoplay muted loop playsinline>
    <source th:src="@{/videos/login-bg.mp4}" type="video/mp4">
    Trình duyệt của bạn không hỗ trợ video.
</video>
<div class="video-overlay"></div>

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-left">

            <h1>Đăng nhập</h1>
            <p>Đăng nhập để tiếp tục trải nghiệm hệ thống mua bán xe cao cấp.</p>
        </div>

        <div class="auth-right">
            <div class="auth-card">
                <h2 class="auth-title">Chào mừng</h2>
                <p class="auth-subtitle">Nhập thông tin tài khoản để tiếp tục</p>

                <div id="errorBox" class="alert-custom d-none"></div>

                <form id="loginForm">
                    <div class="input-group-custom">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25H4.5a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5H4.5A2.25 2.25 0 0 0 2.25 6.75m19.5 0v.243a2.25 2.25 0 0 1-.97 1.848l-7.5 5.25a2.25 2.25 0 0 1-2.56 0l-7.5-5.25a2.25 2.25 0 0 1-.97-1.848V6.75"/>
                        </svg>
                        <input type="email" id="email" class="form-control custom-input" placeholder="Nhập email" required>
                    </div>

                    <div class="input-group-custom">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 0h10.5A2.25 2.25 0 0 1 19.5 12.75v6A2.25 2.25 0 0 1 17.25 21h-10.5A2.25 2.25 0 0 1 4.5 18.75v-6A2.25 2.25 0 0 1 6.75 10.5Z"/>
                        </svg>
                        <input type="password" id="password" class="form-control custom-input" placeholder="Nhập mật khẩu" required>
                    </div>

                    <div class="form-check-row">
                        <label class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <span>Ghi nhớ đăng nhập</span>
                        </label>

                        <a href="#" class="auth-link">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-login">Đăng nhập →</button>

                    <div class="divider">Hoặc</div>

                    <div class="google-wrap">
                        <a href="/oauth2/authorization/google" class="google-btn" title="Đăng nhập với Google">
                            <span>G</span>
                        </a>
                    </div>
                </form>

                <p class="bottom-text">
                    Chưa có tài khoản?
                    <a th:href="@{/register}">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        errorBox.classList.add("d-none");
        errorBox.innerText = "";

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const rememberMe = document.getElementById("rememberMe").checked;

        try {
            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || "Đăng nhập thất bại");
            }

            localStorage.setItem("accessToken", data.accessToken);
            localStorage.setItem("refreshToken", data.refreshToken);

            if (rememberMe) {
                localStorage.setItem("rememberedEmail", email);
            } else {
                localStorage.removeItem("rememberedEmail");
            }

            if (data.role === "ADMIN" || data.role === "STAFF") {
                window.location.href = "/admin/dashboard";
            } else {
                window.location.href = "/customer/dashboard";
            }

        } catch (error) {
            errorBox.classList.remove("d-none");
            errorBox.innerText = error.message;
        }
    });

    window.addEventListener("DOMContentLoaded", () => {
        const rememberedEmail = localStorage.getItem("rememberedEmail");
        if (rememberedEmail) {
            document.getElementById("email").value = rememberedEmail;
            document.getElementById("rememberMe").checked = true;
        }
    });
</script>
</body>
</html>
