<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2ff, #f8fbff);
            font-family: Arial, sans-serif;
        }
        .auth-wrap {
            min-height: 100vh;
        }
        .auth-card {
            max-width: 460px;
            width: 100%;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
<div class="container auth-wrap d-flex align-items-center justify-content-center">
    <div class="card auth-card p-4">
        <h2 class="mb-2 text-center">Đăng nhập</h2>
        <p class="text-muted text-center mb-4">Đăng nhập để vào dashboard</p>

        <div id="errorBox" class="alert alert-danger d-none"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Nhập email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
        </form>

        <p class="text-center mt-3 mb-0">
            Chưa có tài khoản?
            <a th:href="@{/register}">Đăng ký</a>
        </p>
    </div>
</div>

<script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        errorBox.classList.add("d-none");
        errorBox.innerText = "";

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        try {
            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || "Đăng nhập thất bại");
            }

            localStorage.setItem("accessToken", data.accessToken);
            localStorage.setItem("refreshToken", data.refreshToken);

            if (data.role === "ADMIN" || data.role === "STAFF") {
                window.location.href = "/admin/dashboard";
            } else {
                window.location.href = "/customer/dashboard";
            }

        } catch (error) {
            errorBox.classList.remove("d-none");
            errorBox.innerText = error.message;
        }
    });
</script>
</body>
</html>
