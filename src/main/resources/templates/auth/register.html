<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký | WEB BÁN XE</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: 'Be Vietnam Pro', sans-serif;
        background: #050816;
        color: #fff;
        overflow-x: hidden;
    }

    body {
        min-height: 100vh;
        position: relative;
    }

    .video-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
    }

    .video-overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: rgba(0, 0, 0, 0.58);
    }

    .auth-page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 32px 24px;
    }

    .auth-container {
        width: 100%;
        max-width: 1500px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 560px;
        gap: 120px;
        align-items: center;
    }

    .auth-left {
        padding: 0 10px 20px 40px;
    }

    .auth-left h1 {
        font-size: clamp(52px, 6vw, 84px);
        line-height: 1.02;
        font-weight: 800;
        margin-bottom: 18px;
        letter-spacing: -1.5px;
    }

    .auth-left p {
        font-size: 22px;
        max-width: 650px;
        color: rgba(255,255,255,0.86);
        margin-bottom: 0;
    }

    .auth-right {
        display: flex;
        justify-content: flex-end;
    }

    .auth-card {
        width: 100%;
        max-width: 560px;
        padding: 38px 36px 28px;
        border-radius: 32px;
        background: rgba(9, 13, 28, 0.72);
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    .auth-title {
        font-size: 52px;
        font-weight: 800;
        line-height: 1.02;
        margin-bottom: 8px;
        letter-spacing: -1px;
    }

    .auth-subtitle {
        color: rgba(255,255,255,0.7);
        margin-bottom: 24px;
        font-size: 17px;
    }

    .alert-custom {
        border-radius: 16px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 14px;
    }

    .alert-error {
        border: 1px solid rgba(255, 99, 99, 0.22);
background: rgba(255, 82, 82, 0.12);
        color: #ffd1d1;
    }

    .alert-success-custom {
        border: 1px solid rgba(77, 214, 144, 0.22);
        background: rgba(77, 214, 144, 0.12);
        color: #d7ffe8;
    }

    .input-group-custom {
        position: relative;
        margin-bottom: 16px;
    }

    .input-icon {
        position: absolute;
        top: 50%;
        left: 18px;
        transform: translateY(-50%);
        width: 22px;
        height: 22px;
        color: rgba(255,255,255,0.7);
        pointer-events: none;
    }

    .form-control.custom-input {
        height: 62px;
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,0.06);
        background: rgba(255,255,255,0.08);
        color: #fff;
        padding-left: 56px;
        padding-right: 18px;
        font-size: 16px;
        box-shadow: none;
    }

    .form-control.custom-input::placeholder {
        color: rgba(255,255,255,0.48);
    }

    .form-control.custom-input:focus {
        background: rgba(255,255,255,0.10);
        border-color: rgba(67, 120, 255, 0.9);
        color: #fff;
        box-shadow: 0 0 0 4px rgba(67, 120, 255, 0.18);
    }

    .btn-register {
        width: 100%;
        height: 62px;
        border: none;
        border-radius: 18px;
        background: linear-gradient(90deg, #2f6bff 0%, #4a82ff 100%);
        color: #fff;
        font-size: 22px;
        font-weight: 700;
        transition: all 0.25s ease;
        box-shadow: 0 12px 30px rgba(47, 107, 255, 0.28);
        margin-top: 6px;
    }

    .btn-register:hover {
        transform: translateY(-1px);
        background: linear-gradient(90deg, #2763f3 0%, #3f79f1 100%);
    }

    .bottom-text {
        text-align: center;
        color: rgba(255,255,255,0.74);
        font-size: 16px;
        margin: 18px 0 0;
    }

    .bottom-text a {
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
    }

    .bottom-text a:hover {
        color: #c9d9ff;
    }

    @media (max-width: 992px) {
        .auth-container {
            grid-template-columns: 1fr;
            gap: 28px;
        }

        .auth-left {
            display: none;
        }

        .auth-card {
            max-width: 100%;
            padding: 34px 24px 28px;
            border-radius: 26px;
        }

        .auth-title {
            font-size: 40px;
        }
    }

    @media (max-width: 576px) {
        .auth-page {
            padding: 18px 14px;
        }

        .auth-card {
            padding: 26px 18px 22px;
            border-radius: 24px;
        }

        .auth-title {
            font-size: 34px;
        }

        .auth-subtitle {
            font-size: 15px;
        }

        .form-control.custom-input,
        .btn-register {
            height: 58px;
        }
    }
  </style>
</head>
<body>

<video class="video-bg" autoplay muted loop playsinline preload="auto">
  <source th:src="@{/videos/login-bg.mp4}" type="video/mp4">
  Trình duyệt của bạn không hỗ trợ video.
</video>
<div class="video-overlay"></div>

<div class="auth-page">
  <div class="auth-container">
    <div class="auth-left">
      <h1>Đăng ký</h1>
      <p>Tạo tài khoản mới để bắt đầu trải nghiệm hệ thống mua bán xe cao cấp.</p>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <h2 class="auth-title">Tạo tài khoản</h2>
        <p class="auth-subtitle">Điền thông tin bên dưới để đăng ký tài khoản mới</p>

        <div id="errorBox" class="alert-custom alert-error d-none"></div>
        <div id="successBox" class="alert-custom alert-success-custom d-none"></div>

        <form id="registerForm">
          <div class="input-group-custom">
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.75 6.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a8.25 8.25 0 0 1 14.998 0"/>
            </svg>
            <input type="text" id="fullName" class="form-control custom-input" placeholder="Nhập họ tên" required>
          </div>

          <div class="input-group-custom">
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25H4.5a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5H4.5A2.25 2.25 0 0 0 2.25 6.75m19.5 0v.243a2.25 2.25 0 0 1-.97 1.848l-7.5 5.25a2.25 2.25 0 0 1-2.56 0l-7.5-5.25a2.25 2.25 0 0 1-.97-1.848V6.75"/>
            </svg>
            <input type="email" id="email" class="form-control custom-input" placeholder="Nhập email" required>
          </div>

          <div class="input-group-custom">
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 6.75c0-1.243 1.007-2.25 2.25-2.25h15a2.25 2.25 0 0 1 2.25 2.25v10.5c0 1.243-1.007 2.25-2.25 2.25h-15A2.25 2.25 0 0 1 2.25 17.25V6.75Zm2.25-.75v12h15V6h-15Zm2.25 9.75h3v-1.5h-3v1.5Zm0-3h6v-1.5h-6v1.5Z"/>
            </svg>
            <input type="text" id="phone" class="form-control custom-input" placeholder="Nhập số điện thoại" required>
          </div>

          <div class="input-group-custom">
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 0h10.5A2.25 2.25 0 0 1 19.5 12.75v6A2.25 2.25 0 0 1 17.25 21h-10.5A2.25 2.25 0 0 1 4.5 18.75v-6A2.25 2.25 0 0 1 6.75 10.5Z"/>
            </svg>
            <input type="password" id="password" class="form-control custom-input" placeholder="Nhập mật khẩu" required>
          </div>

          <div class="input-group-custom">
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 0h10.5A2.25 2.25 0 0 1 19.5 12.75v6A2.25 2.25 0 0 1 17.25 21h-10.5A2.25 2.25 0 0 1 4.5 18.75v-6A2.25 2.25 0 0 1 6.75 10.5Z"/>
            </svg>
            <input type="password" id="confirmPassword" class="form-control custom-input" placeholder="Xác nhận mật khẩu" required>
          </div>

          <button type="submit" class="btn-register">Đăng ký</button>
        </form>

        <p class="bottom-text">
          Đã có tài khoản?
          <a th:href="@{/login}">Đăng nhập</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById("registerForm");
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  form.addEventListener("submit", async function (e) {
      e.preventDefault();

      errorBox.classList.add("d-none");
      successBox.classList.add("d-none");
      errorBox.innerText = "";
      successBox.innerText = "";

      const payload = {
          fullName: document.getElementById("fullName").value.trim(),
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          password: document.getElementById("password").value.trim(),
          confirmPassword: document.getElementById("confirmPassword").value.trim()
      };

      if (payload.password !== payload.confirmPassword) {
          errorBox.classList.remove("d-none");
          errorBox.innerText = "Mật khẩu xác nhận không khớp";
          return;
      }

      try {
          const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json"
              },
              body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (!response.ok) {
              if (data.message) {
                  throw new Error(data.message);
              }

              const firstError = Object.values(data)[0];
              throw new Error(firstError || "Đăng ký thất bại");
          }

          successBox.classList.remove("d-none");
          successBox.innerText = data.message || "Đăng ký thành công. Đang chuyển sang trang đăng nhập...";

          form.reset();

          setTimeout(() => {
              window.location.href = "/login";
          }, 1200);

      } catch (error) {
          errorBox.classList.remove("d-none");
          errorBox.innerText = error.message;
      }
  });
</script>
</body>
</html>
