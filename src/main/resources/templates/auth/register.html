<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #eef2ff, #f8fbff);
        font-family: Arial, sans-serif;
    }
    .auth-wrap {
        min-height: 100vh;
    }
    .auth-card {
        max-width: 560px;
        width: 100%;
        border: none;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
<div class="container auth-wrap d-flex align-items-center justify-content-center">
  <div class="card auth-card p-4">
    <h2 class="mb-2 text-center">Đăng ký tài khoản</h2>
    <p class="text-muted text-center mb-4">Tạo tài khoản mới để sử dụng hệ thống</p>

    <div id="errorBox" class="alert alert-danger d-none"></div>
    <div id="successBox" class="alert alert-success d-none"></div>

    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">Tên đăng nhập</label>
        <input type="text" id="username" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Họ tên</label>
        <input type="text" id="fullName" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Số điện thoại</label>
        <input type="text" id="phone" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Mật khẩu</label>
        <input type="password" id="password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Đăng ký</button>
    </form>

    <p class="text-center mt-3 mb-0">
      Đã có tài khoản?
      <a th:href="@{/login}">Đăng nhập</a>
    </p>
  </div>
</div>

<script>
  const form = document.getElementById("registerForm");
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  form.addEventListener("submit", async function (e) {
      e.preventDefault();

      errorBox.classList.add("d-none");
      successBox.classList.add("d-none");
      errorBox.innerText = "";
      successBox.innerText = "";

      const payload = {
          username: document.getElementById("username").value.trim(),
          fullName: document.getElementById("fullName").value.trim(),
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          password: document.getElementById("password").value.trim()
      };

      try {
          const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json"
              },
              body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (!response.ok) {
              throw new Error(data.message || "Đăng ký thất bại");
          }

          successBox.classList.remove("d-none");
          successBox.innerText = "Đăng ký thành công. Đang chuyển sang trang đăng nhập...";

          setTimeout(() => {
              window.location.href = "/login";
          }, 1200);

      } catch (error) {
          errorBox.classList.remove("d-none");
          errorBox.innerText = error.message;
      }
  });
</script>
</body>
</html>
