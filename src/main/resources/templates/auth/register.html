<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        background:
            linear-gradient(rgba(8, 12, 20, 0.60), rgba(8, 12, 20, 0.80)),
            url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
        color: #fff;
    }

    .auth-wrap {
        min-height: 100vh;
        padding: 30px 15px;
    }

    .auth-card {
        width: 100%;
        max-width: 580px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 24px;
        background: rgba(17, 25, 40, 0.74);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        padding: 32px 28px;
    }

    .brand-text {
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #c9d4ff;
        text-align: center;
        margin-bottom: 10px;
    }

    .auth-title {
        text-align: center;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .auth-subtitle {
        text-align: center;
        color: #cfd6e4;
        font-size: 14px;
        margin-bottom: 28px;
    }

    .form-label {
        font-weight: 600;
        color: #f5f7fb;
        margin-bottom: 8px;
    }

    .form-control {
        height: 50px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.08);
        color: white;
        padding: 12px 14px;
    }

    .form-control::placeholder {
        color: #b9c0cd;
    }

    .form-control:focus {
        background: rgba(255,255,255,0.10);
        color: white;
        border-color: #7aa2ff;
        box-shadow: 0 0 0 0.2rem rgba(122, 162, 255, 0.18);
    }

    .btn-auth {
        width: 100%;
        height: 52px;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        transition: all 0.25s ease;
        margin-top: 8px;
    }

    .btn-auth:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
    }

    .bottom-text {
        text-align: center;
        margin-top: 22px;
        color: #d7deea;
        font-size: 14px;
    }

    .bottom-text a {
        color: #8fb3ff;
        text-decoration: none;
        font-weight: 700;
    }

    .bottom-text a:hover {
        text-decoration: underline;
    }

    .alert {
        border-radius: 14px;
        font-size: 14px;
    }

    .car-badge {
        display: inline-block;
        margin: 0 auto 18px;
        padding: 8px 16px;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        color: #e8edf8;
        font-size: 13px;
        border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
<div class="container auth-wrap d-flex align-items-center justify-content-center">
  <div class="auth-card">
    <div class="text-center">
      <div class="brand-text">Luxury Car Store</div>
      <div class="car-badge">Tạo tài khoản mới</div>
    </div>

    <h2 class="auth-title">Đăng ký</h2>
    <p class="auth-subtitle">Tham gia để đặt hàng, theo dõi xe yêu thích và nhận ưu đãi</p>

    <div id="errorBox" class="alert alert-danger d-none"></div>
    <div id="successBox" class="alert alert-success d-none"></div>

    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label" for="username">Tên đăng nhập</label>
        <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="fullName">Họ tên</label>
        <input type="text" id="fullName" class="form-control" placeholder="Nhập họ tên đầy đủ" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Nhập email" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="phone">Số điện thoại</label>
        <input type="text" id="phone" class="form-control" placeholder="Nhập số điện thoại">
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Mật khẩu</label>
        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
      </div>

      <button type="submit" class="btn btn-primary btn-auth">Đăng ký tài khoản</button>
    </form>

    <p class="bottom-text">
      Đã có tài khoản?
      <a th:href="@{/login}">Đăng nhập</a>
    </p>
  </div>
</div>

<script>
  const form = document.getElementById("registerForm");
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  form.addEventListener("submit", async function (e) {
      e.preventDefault();

      errorBox.classList.add("d-none");
      successBox.classList.add("d-none");
      errorBox.innerText = "";
      successBox.innerText = "";

      const payload = {
          username: document.getElementById("username").value.trim(),
          fullName: document.getElementById("fullName").value.trim(),
          email: document.getElementById("email").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          password: document.getElementById("password").value.trim()
      };

      try {
          const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json"
              },
              body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (!response.ok) {
              throw new Error(data.message || "Đăng ký thất bại");
          }

          successBox.classList.remove("d-none");
          successBox.innerText = "Đăng ký thành công. Đang chuyển sang trang đăng nhập...";

          setTimeout(() => {
              window.location.href = "/login";
          }, 1200);

      } catch (error) {
          errorBox.classList.remove("d-none");
          errorBox.innerText = error.message;
      }
  });
</script>
</body>
</html>
