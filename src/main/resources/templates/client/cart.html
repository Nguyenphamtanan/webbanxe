<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg: #070a10;
            --card: rgba(17, 24, 39, 0.82);
            --card-2: rgba(13, 18, 30, 0.92);
            --line: rgba(255,255,255,0.08);
            --text: #f8fafc;
            --muted: #a7b0bf;
            --accent: #2f6bff;
            --accent-hover: #6fa2ff;
            --danger: #ef4444;
            --shadow: 0 24px 60px rgba(0,0,0,0.35);
            --radius-lg: 22px;
            --radius-md: 18px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "SF Pro Display", Inter, "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(47,107,255,0.16), transparent 24%),
                radial-gradient(circle at top right, rgba(47,107,255,0.08), transparent 22%),
                linear-gradient(180deg, #070a10 0%, #0a0f18 40%, #070a10 100%);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .page-wrap {
            min-height: 100vh;
            width: min(1400px, calc(100% - 40px));
            margin: 28px auto 0;
            padding-bottom: 40px;
        }

        .cart-box {
            max-width: 1180px;
            margin: 0 auto;
        }

        .page-title {
            font-size: clamp(2.2rem, 4vw, 3.2rem);
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .page-subtitle {
            color: var(--muted);
            margin-bottom: 28px;
            line-height: 1.8;
        }

        .cart-card,
        .summary-card {
            background: linear-gradient(180deg, rgba(18,24,34,0.98), rgba(12,17,24,0.98));
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 22px;
            box-shadow: var(--shadow);
        }

        .cart-item {
            display: grid;
            grid-template-columns: 120px 1fr 160px 160px 100px;
            gap: 18px;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid var(--line);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-thumb {
            width: 120px;
            height: 84px;
            border-radius: 14px;
            object-fit: cover;
            background: #111;
            border: 1px solid var(--line);
        }

        .item-name {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .item-meta {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .price-text,
        .line-total-text {
            font-weight: 700;
        }

        .qty-box {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .qty-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: transparent;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        .qty-btn:hover {
            background: rgba(255,255,255,0.06);
        }

        .qty-value {
            min-width: 28px;
            text-align: center;
            font-weight: 700;
        }

        .remove-btn {
            border: 1px solid rgba(239, 68, 68, 0.35);
            background: transparent;
            color: #ffb3b5;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
        }

        .remove-btn:hover {
            background: rgba(239, 68, 68, 0.08);
        }

        .summary-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 18px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
            color: var(--muted);
        }

        .summary-row.total {
            color: #fff;
            font-weight: 800;
            border-top: 1px solid var(--line);
            padding-top: 14px;
            margin-top: 12px;
        }

        .btn-main,
        .btn-second {
            width: 100%;
            border-radius: 14px;
            padding: 13px 16px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 700;
            transition: 0.2s ease;
            gap: 8px;
        }

        .btn-main {
            border: none;
            background: linear-gradient(135deg, var(--accent), #5e8fff);
            color: #fff;
            box-shadow: 0 12px 28px rgba(47,107,255,0.28);
        }

        .btn-main:hover {
            opacity: 0.95;
            color: #fff;
        }

        .btn-second {
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            color: #fff;
        }

        .btn-second:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .empty-box {
            text-align: center;
            padding: 56px 20px;
            color: var(--muted);
        }

        .empty-box h3 {
            color: #fff;
            margin-bottom: 10px;
        }

        .alert-box {
            display: none;
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 0.95rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.12);
            color: #ffb3b5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        @media (max-width: 991.98px) {
            .cart-item {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .cart-thumb {
                width: 100%;
                height: 200px;
            }

            .qty-box {
                justify-content: flex-start;
            }
        }

        @media (max-width: 575.98px) {
            .page-wrap {
                width: min(100% - 24px, 100%);
            }
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar('cart')"></div>

<div class="page-wrap">
    <div class="cart-box">
        <h1 class="page-title">Giỏ hàng của bạn</h1>
        <p class="page-subtitle">Xem lại các xe quan tâm trước khi gửi yêu cầu báo giá hoặc đặt cọc.</p>

        <div id="errorBox" class="alert-box alert-error"></div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="cart-card">
                    <div class="top-actions">
                        <a href="/showroom" class="btn-second" style="max-width: 240px;">
                            <i class="bi bi-bag"></i>
                            Tiếp tục mua sắm
                        </a>
                    </div>

                    <div id="cartItemsContainer"></div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="summary-card">
                    <div class="summary-title">Tóm tắt lựa chọn</div>

                    <div class="summary-row">
                        <span>Số lượng sản phẩm</span>
                        <span id="totalItems">0</span>
                    </div>

                    <div class="summary-row">
                        <span>Tạm tính</span>
                        <span id="subtotalAmount">0 đ</span>
                    </div>

                    <div class="summary-row">
                        <span>Hình thức tiếp theo</span>
                        <span>Gửi yêu cầu</span>
                    </div>

                    <div class="summary-row total">
                        <span>Giá trị tham khảo</span>
                        <span id="totalAmount">0 đ</span>
                    </div>

                    <div class="mt-4 d-grid gap-3">
                        <a href="/customer/checkout" class="btn-main" id="checkoutBtn">
                            <i class="bi bi-arrow-right-circle"></i>
                            Tiếp tục đặt xe
                        </a>
                        <a href="/customer/dashboard" class="btn-second">
                            <i class="bi bi-grid-1x2"></i>
                            Về dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem("accessToken");
    const cartItemsContainer = document.getElementById("cartItemsContainer");
    const totalItemsEl = document.getElementById("totalItems");
    const subtotalAmountEl = document.getElementById("subtotalAmount");
    const totalAmountEl = document.getElementById("totalAmount");
    const checkoutBtn = document.getElementById("checkoutBtn");
    const errorBox = document.getElementById("errorBox");

    if (!token) {
        window.location.href = "/login";
    }

    function showError(message) {
        errorBox.style.display = "block";
        errorBox.innerText = message;
    }

    function hideError() {
        errorBox.style.display = "none";
        errorBox.innerText = "";
    }

    function formatCurrency(value) {
        return new Intl.NumberFormat("vi-VN").format(Number(value || 0)) + " đ";
    }

    async function loadCart() {
        hideError();

        try {
            const response = await fetch("/api/cart", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem("accessToken");
                localStorage.removeItem("refreshToken");
                window.location.href = "/login";
                return;
            }

            if (!response.ok) {
                throw new Error("Không tải được giỏ hàng");
            }

            const cart = await response.json();
            renderCart(cart);

        } catch (error) {
            console.error(error);
            showError(error.message || "Có lỗi xảy ra khi tải giỏ hàng");
        }
    }

    function renderCart(cart) {
        const items = cart.items || [];

        totalItemsEl.innerText = cart.totalItems ?? 0;
        subtotalAmountEl.innerText = formatCurrency(cart.totalAmount ?? 0);
        totalAmountEl.innerText = formatCurrency(cart.totalAmount ?? 0);

        if (!items.length) {
            cartItemsContainer.innerHTML = `
                <div class="empty-box">
                    <h3>Giỏ hàng đang trống</h3>
                    <p>Bạn chưa thêm xe nào vào giỏ hàng.</p>
                    <div class="mt-4">
                        <a href="/showroom" class="btn-main" style="max-width:220px;">
                            <i class="bi bi-arrow-right"></i>
                            Khám phá showroom
                        </a>
                    </div>
                </div>
            `;
            checkoutBtn.style.pointerEvents = "none";
            checkoutBtn.style.opacity = "0.5";
            return;
        }

        checkoutBtn.style.pointerEvents = "auto";
        checkoutBtn.style.opacity = "1";

        cartItemsContainer.innerHTML = items.map(item => `
            <div class="cart-item">
                <div>
                    <img src="${item.imageUrl || ''}" alt="${item.motorbikeName}" class="cart-thumb">
                </div>

                <div>
                    <div class="item-name">${item.motorbikeName}</div>
                    <div class="item-meta">Mã xe: #${item.motorbikeId}</div>
                </div>

                <div>
                    <div class="item-meta">Đơn giá</div>
                    <div class="price-text">${formatCurrency(item.unitPrice)}</div>
                </div>

                <div>
                    <div class="item-meta mb-2">Số lượng</div>
                    <div class="qty-box">
                        <button class="qty-btn" onclick="changeQuantity(${item.cartItemId}, ${item.quantity - 1})">-</button>
                        <span class="qty-value">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQuantity(${item.cartItemId}, ${item.quantity + 1})">+</button>
                    </div>
                    <div class="line-total-text mt-2">${formatCurrency(item.lineTotal)}</div>
                </div>

                <div>
                    <button class="remove-btn" onclick="removeItem(${item.cartItemId})">Xóa</button>
                </div>
            </div>
        `).join("");
    }

    async function changeQuantity(cartItemId, quantity) {
        try {
            const response = await fetch("/api/cart/update", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    cartItemId: cartItemId,
                    quantity: quantity
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || "Không cập nhật được giỏ hàng");
            }

            const cart = await response.json();
            renderCart(cart);

        } catch (error) {
            console.error(error);
            showError(error.message || "Có lỗi xảy ra khi cập nhật số lượng");
        }
    }

    async function removeItem(cartItemId) {
        try {
            const response = await fetch("/api/cart/remove/" + cartItemId, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || "Không xóa được sản phẩm");
            }

            const cart = await response.json();
            renderCart(cart);

        } catch (error) {
            console.error(error);
            showError(error.message || "Có lỗi xảy ra khi xóa sản phẩm");
        }
    }

    loadCart();
</script>
<div th:replace="fragments/ai-chatbox :: aiChatbox"></div>
</body>
</html>
