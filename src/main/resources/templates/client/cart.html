<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
        --bg: #0b0b0b;
        --sidebar: #111111;
        --card: #171717;
        --line: rgba(255,255,255,0.08);
        --line-strong: rgba(255,255,255,0.2);
        --text: #ffffff;
        --muted: #a8a8a8;
        --danger: #ff4d4f;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
    }

    .layout {
        display: flex;
        min-height: 100vh;
    }

    .sidebar {
        width: 270px;
        background: var(--sidebar);
        border-right: 1px solid var(--line);
        padding: 28px 20px;
        position: sticky;
        top: 0;
        height: 100vh;
    }

    .brand {
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: 2px;
        margin-bottom: 30px;
    }

    .menu-title {
        color: var(--muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin: 26px 0 10px;
    }

    .menu-link {
        display: block;
        color: #f1f1f1;
        padding: 12px 14px;
        border-radius: 12px;
        margin-bottom: 8px;
        text-decoration: none;
        transition: 0.2s ease;
    }

    .menu-link:hover,
    .menu-link.active {
        background: #fff;
        color: #000;
    }

    .main {
        flex: 1;
        padding: 28px;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
        gap: 16px;
    }

    .page-title {
        font-size: 2rem;
        font-weight: 800;
        margin: 0;
    }

    .page-subtitle {
        color: var(--muted);
        margin-top: 6px;
        margin-bottom: 0;
    }

    .btn-ghost,
    .btn-main,
    .btn-danger-outline {
        border: 1px solid var(--line);
        background: transparent;
        color: #fff;
        padding: 10px 16px;
        border-radius: 12px;
        text-decoration: none;
        transition: 0.2s ease;
        cursor: pointer;
    }

    .btn-main {
        background: #fff;
        color: #000;
        border-color: #fff;
        font-weight: 700;
    }

    .btn-main:hover {
        background: transparent;
        color: #fff;
    }

    .btn-ghost:hover,
    .btn-danger-outline:hover {
        background: #fff;
        color: #000;
    }

    .btn-danger-outline {
        border-color: rgba(255,77,79,0.35);
        color: #ffb3b3;
    }

    .hero {
        background: linear-gradient(135deg, #161616, #202020);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 28px;
        margin-bottom: 28px;
    }

    .hero h2 {
        font-size: 2rem;
        font-weight: 900;
        margin-bottom: 10px;
    }

    .hero p {
        color: var(--muted);
        margin-bottom: 0;
        max-width: 720px;
        line-height: 1.7;
    }

    .cart-card,
    .summary-card,
    .empty-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 22px;
    }

    .cart-table-wrap {
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        padding: 16px 12px;
        border-bottom: 1px solid var(--line);
        vertical-align: middle;
    }

    th {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 600;
    }

    .product-name {
        font-weight: 700;
    }

    .price-text {
        color: #fff;
        font-weight: 700;
    }

    .muted {
        color: var(--muted);
    }

    .qty-box {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .qty-input {
        width: 80px;
        background: #101010;
        border: 1px solid var(--line-strong);
        color: #fff;
        border-radius: 10px;
        padding: 8px 10px;
        text-align: center;
    }

    .summary-title {
        font-size: 1.2rem;
        font-weight: 800;
        margin-bottom: 18px;
    }

    .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 14px;
        color: var(--muted);
    }

    .summary-total {
        display: flex;
        justify-content: space-between;
        font-size: 1.25rem;
        font-weight: 800;
        padding-top: 16px;
        border-top: 1px solid var(--line);
        margin-top: 16px;
    }

    .empty-card {
        text-align: center;
        padding: 50px 24px;
    }

    .empty-card h3 {
        font-size: 1.6rem;
        font-weight: 800;
        margin-bottom: 12px;
    }

    .empty-card p {
        color: var(--muted);
        margin-bottom: 24px;
    }

    @media (max-width: 991.98px) {
        .layout {
            flex-direction: column;
        }

        .sidebar {
            width: 100%;
            height: auto;
            position: relative;
        }

        .main {
            padding: 20px;
        }

        .topbar {
            flex-direction: column;
            align-items: start;
        }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">CLIENT PANEL</div>

    <div class="menu-title">Tài khoản</div>
    <a href="/customer/dashboard" class="menu-link">Dashboard</a>

    <div class="menu-title">Mua sắm</div>
    <a href="/" class="menu-link">Trang chủ</a>
    <a href="/customer/cart" class="menu-link active">Giỏ hàng</a>
    <a href="#" class="menu-link">Đơn hàng</a>

    <div class="menu-title">Hệ thống</div>
    <a href="/login" class="menu-link" onclick="logout()">Đăng xuất</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 class="page-title">Giỏ hàng của bạn</h1>
        <p class="page-subtitle">Kiểm tra sản phẩm trước khi tiến hành thanh toán.</p>
      </div>
      <a href="/" class="btn-ghost">Tiếp tục mua sắm</a>
    </div>

    <section class="hero">
      <h2>Everything ready for checkout.</h2>
      <p>
        Xem lại sản phẩm, chỉnh sửa số lượng hoặc xóa khỏi giỏ hàng trước khi sang bước thanh toán.
      </p>
    </section>

    <div id="cartContent"></div>
  </main>
</div>

<script>
  const token = localStorage.getItem("accessToken");

  if (!token) {
      window.location.href = "/login";
  }

  function formatCurrency(value) {
      return new Intl.NumberFormat("vi-VN").format(value) + " đ";
  }

  function logout() {
      localStorage.removeItem("accessToken");
      localStorage.removeItem("refreshToken");
      window.location.href = "/login";
  }

  async function loadCart() {
      try {
          const response = await fetch("/api/cart", {
              method: "GET",
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (response.status === 401 || response.status === 403) {
              logout();
              return;
          }

          if (!response.ok) {
              throw new Error("Không tải được giỏ hàng");
          }

          const data = await response.json();
          renderCart(data);
      } catch (error) {
          console.error(error);
          document.getElementById("cartContent").innerHTML = `
              <div class="empty-card">
                  <h3>Có lỗi xảy ra</h3>
                  <p>Không thể tải dữ liệu giỏ hàng.</p>
              </div>
          `;
      }
  }

  function renderCart(cart) {
      const container = document.getElementById("cartContent");

      if (!cart.items || cart.items.length === 0) {
          container.innerHTML = `
              <div class="empty-card">
                  <h3>Giỏ hàng đang trống</h3>
                  <p>Bạn chưa thêm sản phẩm nào vào giỏ hàng.</p>
                  <a href="/" class="btn-main">Mua sắm ngay</a>
              </div>
          `;
          return;
      }

      let rows = "";
      cart.items.forEach(item => {
          rows += `
              <tr>
                  <td>
                      <div class="product-name">${item.motorbikeName}</div>
                  </td>
                  <td class="price-text">${formatCurrency(item.unitPrice)}</td>
                  <td>
                      <div class="qty-box">
                          <input type="number" min="1" class="qty-input" id="qty-${item.cartItemId}" value="${item.quantity}">
                          <button class="btn-ghost" onclick="updateCartItem(${item.cartItemId})">Cập nhật</button>
                      </div>
                  </td>
                  <td class="price-text">${formatCurrency(item.lineTotal)}</td>
                  <td>
                      <button class="btn-danger-outline" onclick="removeCartItem(${item.cartItemId})">Xóa</button>
                  </td>
              </tr>
          `;
      });

      container.innerHTML = `
          <div class="row g-4">
              <div class="col-lg-8">
                  <div class="cart-card">
                      <div class="cart-table-wrap">
                          <table>
                              <thead>
                                  <tr>
                                      <th>Sản phẩm</th>
                                      <th>Đơn giá</th>
                                      <th>Số lượng</th>
                                      <th>Thành tiền</th>
                                      <th></th>
                                  </tr>
                              </thead>
                              <tbody>
                                  ${rows}
                              </tbody>
                          </table>
                      </div>
                  </div>
              </div>

              <div class="col-lg-4">
                  <div class="summary-card">
                      <div class="summary-title">Tóm tắt đơn hàng</div>

                      <div class="summary-row">
                          <span>Tổng số lượng</span>
                          <strong>${cart.totalItems}</strong>
                      </div>

                      <div class="summary-total">
                          <span>Tổng cộng</span>
                          <span>${formatCurrency(cart.totalAmount)}</span>
                      </div>

                      <div class="d-grid gap-2 mt-4">
                          <a href="/customer/checkout" class="btn-main text-center">Tiến hành thanh toán</a>
                          <button class="btn-danger-outline" onclick="clearCart()">Xóa toàn bộ giỏ hàng</button>
                      </div>
                  </div>
              </div>
          </div>
      `;
  }

  async function updateCartItem(cartItemId) {
      const quantity = Number(document.getElementById(`qty-${cartItemId}`).value);

      if (!quantity || quantity < 1) {
          alert("Số lượng phải lớn hơn 0");
          return;
      }

      try {
          const response = await fetch(`/api/cart/items/${cartItemId}`, {
              method: "PUT",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + token
              },
              body: JSON.stringify({ quantity: quantity })
          });

          if (!response.ok) {
              throw new Error("Không thể cập nhật sản phẩm");
          }

          alert("Cập nhật số lượng thành công");
          loadCart();
      } catch (error) {
          console.error(error);
          alert("Có lỗi khi cập nhật giỏ hàng");
      }
  }

  async function removeCartItem(cartItemId) {
      if (!confirm("Bạn có chắc muốn xóa sản phẩm này khỏi giỏ?")) return;

      try {
          const response = await fetch(`/api/cart/items/${cartItemId}`, {
              method: "DELETE",
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (!response.ok) {
              throw new Error("Không thể xóa sản phẩm");
          }

          loadCart();
      } catch (error) {
          console.error(error);
          alert("Có lỗi khi xóa sản phẩm");
      }
  }

  async function clearCart() {
      if (!confirm("Bạn có chắc muốn xóa toàn bộ giỏ hàng?")) return;

      try {
          const response = await fetch("/api/cart/clear", {
              method: "DELETE",
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (!response.ok) {
              throw new Error("Không thể xóa giỏ hàng");
          }

          loadCart();
      } catch (error) {
          console.error(error);
          alert("Có lỗi khi xóa toàn bộ giỏ hàng");
      }
  }

  loadCart();
</script>
</body>
</html>
