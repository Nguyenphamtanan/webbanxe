<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch hẹn của tôi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg:#070a10;
            --card:rgba(17, 24, 39, 0.82);
            --line:rgba(255,255,255,.08);
            --text:#f8fafc;
            --muted:#a7b0bf;
            --accent:#2f6bff;
            --success:#22c55e;
            --warning:#f59e0b;
            --danger:#ef4444;
        }

        body {
            margin:0;
            font-family: "SF Pro Display", Inter, Arial, sans-serif;
            color:var(--text);
            background:
                radial-gradient(circle at top left, rgba(47,107,255,.12), transparent 25%),
                linear-gradient(180deg,#070a10 0%,#0a0f18 50%,#070a10 100%);
        }

        .wrap {
            max-width:1200px;
            margin:30px auto;
            padding:20px;
        }

        .title {
            font-size:clamp(2rem,4vw,3rem);
            font-weight:900;
            margin-bottom:20px;
        }

        .cardx {
            background:rgba(255,255,255,.03);
            border:1px solid var(--line);
            border-radius:18px;
            padding:18px;
            margin-bottom:16px;
            transition:0.2s;
        }

        .cardx:hover {
            transform:translateY(-3px);
            border-color:rgba(255,255,255,.2);
        }

        .rowx {
            display:flex;
            justify-content:space-between;
            flex-wrap:wrap;
            gap:10px;
        }

        .muted {
            color:var(--muted);
        }

        .status {
            padding:6px 12px;
            border-radius:999px;
            font-size:13px;
            font-weight:700;
        }

        .pending { background:rgba(245,158,11,.15); color:#facc15; }
        .confirmed { background:rgba(34,197,94,.15); color:#4ade80; }
        .cancelled { background:rgba(239,68,68,.15); color:#f87171; }

        .empty {
            text-align:center;
            padding:40px;
            color:var(--muted);
        }

        .btn-lux {
            padding:10px 16px;
            border-radius:12px;
            background:var(--accent);
            color:#fff;
            border:none;
            font-weight:700;
            text-decoration:none;
            display:inline-flex;
            align-items:center;
            gap:8px;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar('appointments')"></div>

<div class="wrap">
    <div class="title">Lịch hẹn của tôi</div>
    <div id="list"></div>
</div>

<script>
    const token = localStorage.getItem("accessToken") || localStorage.getItem("token");

    if (!token) {
        window.location.href = "/login";
    }

    function getStatusClass(status) {
        if (!status) return "";
        status = status.toLowerCase();

        if (status.includes("confirm")) return "confirmed";
        if (status.includes("cancel")) return "cancelled";
        return "pending";
    }

    async function loadAppointments() {
        try {
            const res = await fetch("/api/appointments/my", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const list = document.getElementById("list");

            if (!res.ok) {
                list.innerHTML = `<div class="empty">Không tải được dữ liệu</div>`;
                return;
            }

            const data = await res.json();

            if (!data.length) {
                list.innerHTML = `
                    <div class="empty">
                        Bạn chưa có lịch hẹn nào <br><br>
                        <a href="/showroom" class="btn-lux">
                            <i class="bi bi-car-front"></i>
                            Đi xem xe ngay
                        </a>
                    </div>
                `;
                return;
            }

            list.innerHTML = data.map(a => `
                <div class="cardx">
                    <div class="rowx">
                        <div>
                            <b>${a.motorbikeName || "Xe không xác định"}</b>
                            <div class="muted">Mã lịch: ${a.appointmentCode || "-"}</div>
                        </div>

                        <div class="status ${getStatusClass(a.status)}">
                            ${a.status || "UNKNOWN"}
                        </div>
                    </div>

                    <div class="mt-2">
                        <b>Ngày hẹn:</b> ${a.appointmentTime || "-"}
                    </div>

                    <div class="muted mt-1">
                        ${a.note || ""}
                    </div>
                </div>
            `).join("");

        } catch (err) {
            console.error(err);
            document.getElementById("list").innerHTML =
                `<div class="empty">Lỗi tải dữ liệu</div>`;
        }
    }

    loadAppointments();
</script>

</body>
</html>
