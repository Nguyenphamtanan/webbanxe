<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử hoàn tiền</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg: #070a10;
            --card: rgba(17, 24, 39, 0.82);
            --line: rgba(255,255,255,0.08);
            --text: #f8fafc;
            --muted: #a7b0bf;
            --accent: #2f6bff;
            --accent-hover: #6fa2ff;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 24px 60px rgba(0,0,0,0.35);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "SF Pro Display", Inter, "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(47,107,255,0.16), transparent 24%),
                radial-gradient(circle at top right, rgba(47,107,255,0.08), transparent 22%),
                linear-gradient(180deg, #070a10 0%, #0a0f18 40%, #070a10 100%);
        }

        .page-shell {
            width: min(1200px, calc(100% - 40px));
            margin: 28px auto 0;
            padding-bottom: 40px;
        }

        .page-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .page-sub {
            color: var(--muted);
            margin-bottom: 24px;
        }

        .alert-box {
            display: none;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 18px;
            font-size: .95rem;
            border: 1px solid transparent;
        }

        .alert-error {
            background: rgba(239,68,68,0.12);
            color: #ffb4b4;
            border-color: rgba(239,68,68,0.28);
        }

        .table-wrap {
            background: linear-gradient(180deg, rgba(18,24,34,0.98), rgba(12,17,24,0.98));
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-responsive {
            border-radius: 18px;
            overflow: hidden;
        }

        table {
            margin: 0;
            color: #fff;
        }

        thead th {
            background: rgba(255,255,255,0.04) !important;
            color: #dbe4ee !important;
            font-weight: 800;
            border-bottom: 1px solid var(--line) !important;
            white-space: nowrap;
        }

        tbody td {
            vertical-align: middle;
            border-color: rgba(255,255,255,0.06) !important;
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .status-badge {
            display: inline-block;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .status-refunded {
            background: rgba(34,197,94,0.12);
            color: #9ef0b9;
            border-color: rgba(34,197,94,0.25);
        }

        .status-paid,
        .status-confirmed {
            background: rgba(47,107,255,0.12);
            color: #b9d2ff;
            border-color: rgba(47,107,255,0.25);
        }

        .status-pending,
        .status-unpaid {
            background: rgba(245,158,11,0.12);
            color: #ffd76a;
            border-color: rgba(245,158,11,0.25);
        }

        .status-cancelled,
        .status-failed {
            background: rgba(239,68,68,0.12);
            color: #ffb3b5;
            border-color: rgba(239,68,68,0.25);
        }

        .btn-detail {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            color: #fff;
            text-decoration: none;
            transition: .25s ease;
        }

        .btn-detail:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .empty-box {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar('refunds')}"></div>

<div class="page-shell">
    <div class="page-title">Lịch sử hoàn tiền</div>
    <div class="page-sub">Theo dõi các đơn đặt cọc đã hoàn tiền hoặc có liên quan đến hoàn tiền.</div>

    <div id="errorBox" class="alert-box alert-error"></div>

    <div class="table-wrap">
        <div class="table-responsive">
            <table class="table table-dark align-middle">
                <thead>
                <tr>
                    <th>Mã cọc</th>
                    <th>Tên xe</th>
                    <th>Tiền cọc</th>
                    <th>Thanh toán</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="refundTableBody">
                <tr>
                    <td colspan="7" class="text-center text-secondary py-4">Đang tải dữ liệu...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem("accessToken") || localStorage.getItem("token");

    if (!token) {
        window.location.href = "/login";
    }

    function showError(message) {
        const box = document.getElementById("errorBox");
        box.style.display = "block";
        box.innerText = message;
    }

    function formatMoney(value) {
        if (value == null) return "---";
        return Number(value).toLocaleString("vi-VN") + " đ";
    }

    function formatDate(value) {
        if (!value) return "---";
        return new Date(value).toLocaleString("vi-VN");
    }

    function statusClass(value) {
        const v = (value || "").toUpperCase();
        if (v === "REFUNDED") return "status-refunded";
        if (v === "PAID") return "status-paid";
        if (v === "CONFIRMED") return "status-confirmed";
        if (v === "PENDING" || v === "UNPAID") return "status-pending";
        if (v === "CANCELLED" || v === "FAILED") return "status-cancelled";
        return "status-pending";
    }

    async function loadRefunds() {
        try {
const res = await fetch("/api/deposits/my", {
     headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.status === 401 || res.status === 403) {
                localStorage.removeItem("accessToken");
                localStorage.removeItem("refreshToken");
                localStorage.removeItem("token");
                window.location.href = "/login";
                return;
            }

            if (!res.ok) {
                throw new Error("Không tải được danh sách hoàn tiền");
            }

            const data = await res.json();
            const refunds = data.filter(x =>
                x.status === "REFUNDED" ||
                x.paymentStatus === "REFUNDED"
            );

            const tbody = document.getElementById("refundTableBody");

            if (!refunds.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-box">
                                Chưa có đơn hoàn tiền nào.
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = refunds.map(item => `
                <tr>
                    <td>${item.depositCode || "---"}</td>
                    <td>${item.motorbikeName || "---"}</td>
                    <td>${formatMoney(item.depositAmount)}</td>
                    <td>
                        <span class="status-badge ${statusClass(item.paymentStatus)}">
                            ${item.paymentStatus || "---"}
                        </span>
                    </td>
                    <td>
                        <span class="status-badge ${statusClass(item.status)}">
                            ${item.status || "---"}
                        </span>
                    </td>
                    <td>${formatDate(item.createdAt)}</td>
                    <td>
                        <a class="btn-detail" href="/customer/deposits/${item.id}">
                            <i class="bi bi-eye"></i>
                            Chi tiết
                        </a>
                    </td>
                </tr>
            `).join("");
        } catch (err) {
            console.error(err);
            showError(err.message || "Có lỗi xảy ra khi tải danh sách hoàn tiền");
        }
    }

    loadRefunds();
</script>
</body>
</html>
