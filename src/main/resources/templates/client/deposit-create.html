<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Tạo đặt cọc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root{
        --bg:#070a10;
        --card:rgba(17, 24, 39, 0.82);
        --line:rgba(255,255,255,.08);
        --muted:#a7b0bf;
        --accent:#2f6bff;
        --accent-hover:#6fa2ff;
        --text:#f8fafc;
        --shadow:0 24px 60px rgba(0,0,0,0.35);
    }

    body{
        margin: 0;
        background:
            radial-gradient(circle at top left, rgba(47,107,255,.16), transparent 24%),
            linear-gradient(180deg,#070a10 0%,#0a0f18 45%,#070a10 100%);
        color:var(--text);
        font-family:"SF Pro Display", Inter, sans-serif;
        min-height:100vh;
    }

    a { text-decoration:none; color:inherit; }

    .wrap{width:min(1200px, calc(100% - 40px));margin:28px auto 0;padding-bottom:40px}

    .cardx{
        background:linear-gradient(180deg, rgba(18,24,34,0.98), rgba(12,17,24,0.98));
        border:1px solid var(--line);
        border-radius:24px;
        padding:24px;
        backdrop-filter: blur(10px);
        box-shadow:var(--shadow);
    }

    .title{font-size:clamp(2rem, 4vw, 3rem);font-weight:900;margin-bottom:8px;letter-spacing:-1px}
    .muted{color:var(--muted)}

    .bike-box{
        background:rgba(255,255,255,.03);
        border:1px solid var(--line);
        border-radius:20px;
        overflow:hidden;
        height:100%;
    }

    .bike-box img{
        width:100%;
        height:260px;
        object-fit:cover;
        background:#0b1016;
    }

    .bike-body{padding:18px}
    .bike-name{font-size:1.2rem;font-weight:900;margin-bottom:8px}
    .price{font-size:1.4rem;font-weight:900}

    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}

    .mini{
        background:#101722;
        border:1px solid var(--line);
        border-radius:16px;
        padding:16px;
    }

    .label{color:var(--muted);font-size:.9rem;margin-bottom:8px}
    .value{font-weight:800}

    .form-control,.form-select{
        background:#101722 !important;
        color:#fff !important;
        border:1px solid rgba(255,255,255,.1) !important;
        border-radius:14px !important;
        min-height:48px;
    }

    textarea.form-control{min-height:120px}

    .btn-lux{
        min-height:48px;
        padding:10px 18px;
        border-radius:14px;
        border:1px solid var(--line);
        background:rgba(255,255,255,.03);
        color:#fff;
        font-weight:700;
        text-decoration:none;
        display:inline-flex;
        align-items:center;
        gap:8px;
        cursor: pointer;
    }

    .btn-lux:hover {
        background: rgba(255,255,255,0.06);
        color:#fff;
    }

    .btn-lux-primary{
        background:linear-gradient(135deg, var(--accent), #5e8fff);
        border-color:transparent;
        box-shadow: 0 12px 28px rgba(47,107,255,0.28);
    }

    @media(max-width:768px){
        .grid{grid-template-columns:1fr}
    }

    @media (max-width: 575.98px) {
        .wrap { width: min(100% - 24px, 100%); }
    }
  </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar('requests')"></div>

<div class="wrap">
  <div class="mb-3 d-flex gap-2 flex-wrap">
    <a href="/customer/requests" class="btn-lux">
      <i class="bi bi-arrow-left"></i>
      Quay lại yêu cầu
    </a>
    <a href="/showroom" class="btn-lux">
      <i class="bi bi-grid"></i>
      Showroom
    </a>
  </div>

  <div class="cardx">
    <div class="row g-4">
      <div class="col-lg-5">
        <div class="bike-box">
          <img id="bikeImage" src="https://via.placeholder.com/900x600?text=No+Image" alt="bike">
          <div class="bike-body">
            <div class="bike-name" id="bikeName">Đang tải...</div>
            <div class="muted mb-2" id="requestCode"></div>
            <div class="price" id="quotedPrice">-</div>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="title">Tạo đặt cọc</div>
        <p class="muted mb-4">Tạo phiếu đặt cọc từ yêu cầu đã được đồng ý báo giá.</p>

        <div class="grid mb-4">
          <div class="mini">
            <div class="label">Giá báo</div>
            <div class="value" id="quotedPrice2">-</div>
          </div>
          <div class="mini">
            <div class="label">Tiền cọc cần thanh toán</div>
            <div class="value" id="depositAmount">-</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Phương thức thanh toán</label>
          <select id="paymentMethod" class="form-select">
            <option value="BANK_TRANSFER">Chuyển khoản</option>
            <option value="COD">Tiền mặt</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Ghi chú</label>
          <textarea id="note" class="form-control" placeholder="Ví dụ: Tôi sẽ chuyển khoản trong hôm nay..."></textarea>
        </div>

        <div class="d-flex gap-2 flex-wrap">
          <button class="btn-lux btn-lux-primary" onclick="createDeposit()">
            <i class="bi bi-cash-coin"></i>
            Tạo đặt cọc
          </button>
          <a href="/customer/requests" class="btn-lux">Hủy</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem("accessToken");
  const requestId = new URLSearchParams(window.location.search).get("requestId");
  let selectedMotorbikeId = null;

  if (!token) {
      window.location.href = "/login";
  }

  function formatCurrency(v){
      if(v == null) return "-";
      return new Intl.NumberFormat("vi-VN").format(Number(v)) + " đ";
  }

  async function loadRequest(){
      const res = await fetch(`/api/requests/${requestId}`, {
          headers:{ Authorization:"Bearer " + token }
      });

      const text = await res.text();
      if(!res.ok){
          alert(text || "Không tải được yêu cầu");
          return;
      }

      const data = JSON.parse(text);
      const item = data.items && data.items.length ? data.items[0] : null;

      selectedMotorbikeId = item?.motorbikeId || null;

      document.getElementById("bikeImage").src = item?.motorbikeImage || "https://via.placeholder.com/900x600?text=No+Image";
      document.getElementById("bikeName").innerText = item?.motorbikeName || "Xe không xác định";
      document.getElementById("requestCode").innerText = "Mã yêu cầu: " + data.requestCode;
      document.getElementById("quotedPrice").innerText = formatCurrency(data.quotedPrice);
      document.getElementById("quotedPrice2").innerText = formatCurrency(data.quotedPrice);
      document.getElementById("depositAmount").innerText = formatCurrency(data.depositRequired);
  }

  async function createDeposit(){
      if (!selectedMotorbikeId) {
          alert("Không tìm thấy motorbikeId từ yêu cầu");
          return;
      }

      const payload = {
          motorbikeId: Number(selectedMotorbikeId),
          requestId: Number(requestId),
          paymentMethod: document.getElementById("paymentMethod").value,
          note: document.getElementById("note").value.trim()
      };

      const res = await fetch("/api/deposits", {
          method:"POST",
          headers:{
              "Content-Type":"application/json",
              Authorization:"Bearer " + token
          },
          body: JSON.stringify(payload)
      });

      const text = await res.text();
      if(!res.ok){
          alert(text || "Không tạo được đặt cọc");
          return;
      }

      const data = JSON.parse(text);
      console.log("create deposit response =", data);

      const depositId = data.depositId ?? data.id;
      if (!depositId || isNaN(Number(depositId))) {
          alert("Response tạo đặt cọc không trả về depositId hợp lệ");
          return;
      }

      window.location.href = "/customer/deposits/" + depositId;
  }

  loadRequest();
</script>
<div th:replace="fragments/ai-chatbox :: aiChatbox"></div>
</body>
</html>
