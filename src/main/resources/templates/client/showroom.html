<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Showroom xe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0b0b0b; color:#fff; font-family:Arial,sans-serif; }
        .wrapper { max-width:1280px; margin:40px auto; }
        .filter-box, .card-box {
            background:#151515;
            border:1px solid rgba(255,255,255,0.08);
            border-radius:20px;
            padding:24px;
        }
        .product-card {
            background:#111;
            border:1px solid rgba(255,255,255,0.08);
            border-radius:18px;
            overflow:hidden;
            height:100%;
        }
        .product-card img {
            width:100%;
            height:220px;
            object-fit:cover;
            background:#000;
        }
        .product-body { padding:18px; }
        .product-name { font-size:1.05rem; font-weight:700; min-height:48px; }
        .product-meta { color:#aaa; font-size:0.92rem; margin-bottom:10px; }
        .product-price { font-size:1.2rem; font-weight:800; }
        .form-select {
            background:#0f0f0f;
            color:#fff;
            border:1px solid rgba(255,255,255,0.12);
        }
        .form-select:focus {
            border-color:#fff;
            box-shadow:none;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="mb-4">
        <h2 class="mb-2">Showroom xe</h2>
        <p class="text-secondary mb-0">Lọc xe theo kho, danh mục và hãng xe</p>
    </div>

    <div class="filter-box mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Chọn kho</label>
                <select id="warehouseId" class="form-select" onchange="loadProducts()">
                    <option value="">Tất cả kho</option>
                    <option th:each="w : ${warehouses}" th:value="${w.id}" th:text="${w.name}"></option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Chọn danh mục</label>
                <select id="categoryId" class="form-select" onchange="loadProducts()">
                    <option value="">Tất cả danh mục</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Chọn hãng</label>
                <select id="brandId" class="form-select" onchange="loadProducts()">
                    <option value="">Tất cả hãng</option>
                    <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option>
                </select>
            </div>
        </div>
    </div>

    <div class="card-box">
        <div class="row g-4" id="productList">
            <div class="col-12 text-center text-secondary">Đang tải dữ liệu...</div>
        </div>
    </div>
</div>

<script>
    async function loadProducts() {
        const warehouseId = document.getElementById("warehouseId").value;
        const categoryId = document.getElementById("categoryId").value;
        const brandId = document.getElementById("brandId").value;

        const params = new URLSearchParams();
        if (warehouseId) params.append("warehouseId", warehouseId);
        if (categoryId) params.append("categoryId", categoryId);
        if (brandId) params.append("brandId", brandId);

        const container = document.getElementById("productList");
        container.innerHTML = `<div class="col-12 text-center text-secondary">Đang tải dữ liệu...</div>`;

        try {
            const response = await fetch(`/api/showroom/filter?${params.toString()}`);
            if (!response.ok) throw new Error("Không tải được danh sách xe");

            const data = await response.json();

            if (!data.length) {
                container.innerHTML = `<div class="col-12 text-center text-secondary">Không có xe phù hợp</div>`;
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="col-lg-3 col-md-6">
                    <div class="product-card">
                        <img src="${item.primaryImageUrl || 'https://via.placeholder.com/600x400?text=No+Image'}"
                             alt="${item.name || ''}"
                             onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">
                        <div class="product-body">
                            <div class="product-name">${item.name ?? ''}</div>
                            <div class="product-meta">${item.brandName ?? ''} • ${item.categoryName ?? ''}</div>
                            <div class="product-price">${Number(item.price ?? 0).toLocaleString("vi-VN")} đ</div>
                            <a class="btn btn-outline-light w-100 mt-3" href="/showroom/${item.slug}">
                                Xem chi tiết
                            </a>
                        </div>
                    </div>
                </div>
            `).join("");
        } catch (error) {
            console.error(error);
            container.innerHTML = `<div class="col-12 text-center text-danger">Lỗi tải dữ liệu</div>`;
        }
    }

    loadProducts();
</script>
</body>
</html>
