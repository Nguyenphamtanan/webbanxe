<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết đặt cọc</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        margin: 0;
        padding: 30px;
    }

    .wrap {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }

    .title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 24px;
    }

    .info p {
        margin: 10px 0;
        font-size: 16px;
    }

    .qr-box {
        text-align: center;
        border: 1px solid #eee;
        border-radius: 12px;
        padding: 20px;
        background: #fafafa;
    }

    .qr-box img {
        max-width: 100%;
        border-radius: 12px;
    }

    .btn {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 18px;
        border-radius: 10px;
        background: #111;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
    }

    .status {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #eee;
        font-size: 14px;
        font-weight: 600;
    }
  </style>
</head>
<body th:attr="data-deposit-id=${depositId}">
<div class="wrap">
  <div class="title">Chi tiết đặt cọc</div>

  <div class="grid">
    <div class="info">
      <p><strong>Mã đặt cọc:</strong> <span id="depositCode">---</span></p>
      <p><strong>Tên xe:</strong> <span id="motorbikeName">---</span></p>
      <p><strong>Giá xe:</strong> <span id="quotedPrice">---</span></p>
      <p><strong>Số tiền cọc (5%):</strong> <span id="depositAmount">---</span></p>
      <p><strong>Trạng thái cọc:</strong> <span id="depositStatus" class="status">---</span></p>
      <p><strong>Trạng thái thanh toán:</strong> <span id="paymentStatus" class="status">---</span></p>
    </div>

    <div class="qr-box">
      <img id="qrImage" src="" alt="QR PayOS">
      <div>
        <a id="checkoutBtn" class="btn" href="#" target="_blank">Thanh toán với PayOS</a>
      </div>
    </div>
  </div>
</div>

<script>
  const depositId = document.body.dataset.depositId;
  const token = localStorage.getItem("token");

  function formatMoney(value) {
      if (value == null) return "---";
      return Number(value).toLocaleString("vi-VN") + " đ";
  }

  async function loadDeposit() {
      try {
          const res = await fetch(`/api/deposits/${depositId}`, {
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (!res.ok) {
              throw new Error("Không lấy được chi tiết đặt cọc");
          }

          const d = await res.json();

          document.getElementById("depositCode").textContent = d.depositCode || "---";
          document.getElementById("motorbikeName").textContent = d.motorbikeName || "---";
          document.getElementById("quotedPrice").textContent = formatMoney(d.quotedPrice);
          document.getElementById("depositAmount").textContent = formatMoney(d.depositAmount);
          document.getElementById("depositStatus").textContent = d.status || "---";
          document.getElementById("paymentStatus").textContent = d.paymentStatus || "---";

          if (d.qrCode) {
              document.getElementById("qrImage").src = d.qrCode;
          }

          if (d.checkoutUrl) {
              document.getElementById("checkoutBtn").href = d.checkoutUrl;
          }
      } catch (err) {
          console.error(err);
          alert("Không tải được thông tin đặt cọc");
      }
  }

  loadDeposit();
</script>
</body>
</html>
