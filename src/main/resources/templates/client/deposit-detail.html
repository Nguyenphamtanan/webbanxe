<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết đặt cọc</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
        --bg: #070a10;
        --card: rgba(17, 24, 39, 0.82);
        --card-2: rgba(13, 18, 30, 0.92);
        --line: rgba(255,255,255,0.08);
        --text: #f8fafc;
        --muted: #a7b0bf;
        --accent: #2f6bff;
        --accent-hover: #6fa2ff;
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;
        --shadow: 0 24px 60px rgba(0,0,0,0.35);
        --radius-lg: 22px;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "SF Pro Display", Inter, "Segoe UI", Arial, sans-serif;
        background:
            radial-gradient(circle at top left, rgba(47,107,255,0.16), transparent 24%),
            radial-gradient(circle at top right, rgba(47,107,255,0.08), transparent 22%),
            linear-gradient(180deg, #070a10 0%, #0a0f18 40%, #070a10 100%);
    }

    a {
        text-decoration: none;
        color: inherit;
    }

    .page-shell {
        width: min(1200px, calc(100% - 40px));
        margin: 28px auto 0;
        padding-bottom: 40px;
    }

    .wrap {
        background: linear-gradient(180deg, rgba(18,24,34,0.98), rgba(12,17,24,0.98));
        border-radius: 24px;
        padding: 24px;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
    }

    .title {
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 900;
        margin-bottom: 20px;
        letter-spacing: -1px;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 24px;
    }

    .info p {
        margin: 12px 0;
        font-size: 16px;
        color: #dfe7f2;
        line-height: 1.8;
    }

    .qr-box {
        text-align: center;
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 20px;
        background: rgba(255,255,255,0.03);
    }

    .qr-box img {
        max-width: 100%;
        border-radius: 12px;
        background: #fff;
    }

    .btn-lux {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 48px;
        margin-top: 16px;
        padding: 12px 18px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), #5e8fff);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        border: 0;
        box-shadow: 0 12px 28px rgba(47,107,255,0.28);
    }

    .btn-lux:hover {
        color: #fff;
        opacity: 0.95;
    }

    .status {
        display: inline-block;
        padding: 7px 12px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 700;
        border: 1px solid transparent;
    }

    .status.pending,
    .status.waiting {
        background: rgba(245, 158, 11, 0.12);
        color: #ffd76a;
        border-color: rgba(245, 158, 11, 0.25);
    }

    .status.paid,
    .status.success,
    .status.confirmed {
        background: rgba(34, 197, 94, 0.12);
        color: #9ef0b9;
        border-color: rgba(34, 197, 94, 0.25);
    }

    .status.cancelled,
    .status.failed,
    .status.refunded,
    .status.unpaid {
        background: rgba(239, 68, 68, 0.12);
        color: #ffb3b5;
        border-color: rgba(239, 68, 68, 0.25);
    }

    .muted {
        color: var(--muted);
    }

    @media (max-width: 991.98px) {
        .grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 575.98px) {
        .page-shell {
            width: min(100% - 24px, 100%);
        }
    }
  </style>
</head>
<body th:attr="data-deposit-id=${depositId}">

<div th:replace="fragments/navbar :: navbar('requests')"></div>

<div class="page-shell">
  <div class="wrap">
    <div class="title">Chi tiết đặt cọc</div>

    <div class="grid">
      <div class="info">
        <p><strong>Mã đặt cọc:</strong> <span id="depositCode">---</span></p>
        <p><strong>Tên xe:</strong> <span id="motorbikeName">---</span></p>
        <p><strong>Giá xe:</strong> <span id="quotedPrice">---</span></p>
        <p><strong>Số tiền cọc:</strong> <span id="depositAmount">---</span></p>
        <p><strong>Trạng thái cọc:</strong> <span id="depositStatus" class="status">---</span></p>
        <p><strong>Trạng thái thanh toán:</strong> <span id="paymentStatus" class="status">---</span></p>
        <p class="muted">Nếu đã tạo QR PayOS, anh có thể quét mã hoặc bấm nút thanh toán ở bên phải.</p>
      </div>

      <div class="qr-box">
        <img id="qrImage" src="" alt="QR PayOS">
        <div>
          <a id="checkoutBtn" class="btn-lux" href="#" target="_blank">
            <i class="bi bi-qr-code-scan"></i>
            Thanh toán với PayOS
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const depositId = document.body.dataset.depositId;
  const token = localStorage.getItem("accessToken") || localStorage.getItem("token");

  if (!token) {
      window.location.href = "/login";
  }

  function formatMoney(value) {
      if (value == null) return "---";
      return Number(value).toLocaleString("vi-VN") + " đ";
  }

  function applyStatus(el, value) {
      const text = (value || "---").toString();
      const normalized = text.toLowerCase();
      el.textContent = text;
      el.className = "status " + normalized;
  }

  async function loadDeposit() {
      try {
          const res = await fetch(`/api/deposits/${depositId}`, {
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (res.status === 401 || res.status === 403) {
              localStorage.removeItem("accessToken");
              localStorage.removeItem("refreshToken");
              localStorage.removeItem("token");
              window.location.href = "/login";
              return;
          }

          if (!res.ok) {
              throw new Error("Không lấy được chi tiết đặt cọc");
          }

          const d = await res.json();

          document.getElementById("depositCode").textContent = d.depositCode || "---";
          document.getElementById("motorbikeName").textContent = d.motorbikeName || "---";
          document.getElementById("quotedPrice").textContent = formatMoney(d.quotedPrice);
          document.getElementById("depositAmount").textContent = formatMoney(d.depositAmount);

          applyStatus(document.getElementById("depositStatus"), d.status || "---");
          applyStatus(document.getElementById("paymentStatus"), d.paymentStatus || "---");

          if (d.qrCode) {
              document.getElementById("qrImage").src = d.qrCode;
          }

          if (d.checkoutUrl) {
              document.getElementById("checkoutBtn").href = d.checkoutUrl;
          } else {
              document.getElementById("checkoutBtn").style.pointerEvents = "none";
              document.getElementById("checkoutBtn").style.opacity = "0.5";
          }
      } catch (err) {
          console.error(err);
          alert("Không tải được thông tin đặt cọc");
      }
  }

  loadDeposit();
</script>
</body>
</html>
