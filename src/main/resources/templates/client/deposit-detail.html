<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết đặt cọc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
        --bg:#0a0f14;
        --card:#131a22;
        --line:rgba(255,255,255,.08);
        --muted:#9ca3af;
        --accent:#2563eb;
    }

    body{
        background:
            radial-gradient(circle at top left, rgba(37,99,235,.10), transparent 24%),
            linear-gradient(180deg,#0a0f14 0%,#0d131a 45%,#0a0f14 100%);
        color:#fff;
        font-family:"SF Pro Display", Inter, sans-serif;
        min-height:100vh;
    }

    .wrap{
        max-width:1100px;
        margin:40px auto;
        padding:0 16px;
    }

    .cardx{
        background:rgba(19,26,34,.9);
        border:1px solid var(--line);
        border-radius:24px;
        padding:24px;
        margin-bottom:18px;
        backdrop-filter: blur(10px);
    }

    .title{
        font-size:2rem;
        font-weight:900;
        margin-bottom:8px;
    }

    .muted{
        color:var(--muted);
    }

    .grid{
        display:grid;
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:14px;
    }

    .mini{
        background:#0d1319;
        border:1px solid var(--line);
        border-radius:16px;
        padding:16px;
    }

    .label{
        color:var(--muted);
        font-size:.9rem;
        margin-bottom:8px;
    }

    .value{
        font-weight:800;
        font-size:1.05rem;
        word-break:break-word;
    }

    .copy-box{
        background:#0d1319;
        border:1px dashed rgba(255,255,255,.18);
        border-radius:14px;
        padding:14px;
        font-weight:700;
        word-break:break-all;
    }

    .btn-lux{
        min-height:48px;
        padding:10px 18px;
        border-radius:14px;
        border:1px solid var(--line);
        background:rgba(255,255,255,.03);
        color:#fff;
        font-weight:700;
        text-decoration:none;
        display:inline-flex;
        align-items:center;
        gap:8px;
    }

    .btn-lux:hover{
        color:#fff;
        background:rgba(255,255,255,.06);
    }

    .btn-lux-primary{
        background:var(--accent);
        border-color:var(--accent);
    }

    .btn-lux-primary:hover{
        background:#1d4ed8;
        border-color:#1d4ed8;
    }

    .status{
        display:inline-block;
        padding:8px 12px;
        border-radius:999px;
        font-weight:700;
        background:rgba(245,158,11,.14);
        color:#fde68a;
        border:1px solid rgba(245,158,11,.28);
    }

    .status-paid{
        background:rgba(59,130,246,.14);
        color:#bfdbfe;
        border-color:rgba(59,130,246,.28);
    }

    .status-confirmed{
        background:rgba(22,163,74,.14);
        color:#bbf7d0;
        border-color:rgba(22,163,74,.28);
    }

    .bike-row{
        display:flex;
        align-items:center;
        gap:16px;
        flex-wrap:wrap;
    }

    .bike-image{
        width:180px;
        height:120px;
        object-fit:cover;
        border-radius:16px;
        border:1px solid var(--line);
        background:#0d1319;
    }

    .copy-btn{
        margin-top:10px;
    }

    .qr-box{
        background:#fff;
        border-radius:16px;
        padding:16px;
        display:inline-block;
    }

    .qr-image{
        width:260px;
        max-width:100%;
        display:block;
    }

    @media(max-width:768px){
        .grid{
            grid-template-columns:1fr;
        }

        .bike-image{
            width:100%;
            height:200px;
        }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="mb-3 d-flex gap-2 flex-wrap">
    <a href="/customer/requests" class="btn-lux">Yêu cầu của tôi</a>
    <a href="/showroom" class="btn-lux">Showroom</a>
  </div>

  <div id="depositDetail"></div>
</div>

<script>
  const token = localStorage.getItem("accessToken");
  const depositId = window.location.pathname.split("/").pop();
  const detailEl = document.getElementById("depositDetail");

  function formatCurrency(v){
      if(v == null) return "-";
      return new Intl.NumberFormat("vi-VN").format(Number(v)) + " đ";
  }

  function formatDate(v){
      if(!v) return "-";
      return new Date(v).toLocaleString("vi-VN");
  }

  function statusLabel(status){
      const map = {
          PENDING:"Chờ thanh toán",
          PAID:"Đã báo chuyển khoản",
          CONFIRMED:"Đã xác nhận cọc",
          CANCELLED:"Đã hủy",
          REFUNDED:"Đã hoàn cọc"
      };
      return map[status] || status;
  }

  function paymentMethodLabel(method){
      const map = {
          BANK_TRANSFER: "Chuyển khoản",
          COD: "Tiền mặt",
          MOMO: "MoMo",
          VNPAY: "VNPay"
      };
      return map[method] || method || "-";
  }

  function paymentStatusLabel(status){
      const map = {
          UNPAID: "Chưa thanh toán",
          DEPOSIT_PAID: "Đã thanh toán cọc",
          PARTIALLY_PAID: "Đã thanh toán một phần",
          PAID: "Đã thanh toán đủ",
          REFUNDED: "Đã hoàn tiền"
      };
      return map[status] || status || "-";
  }

  function statusClass(status){
      if(status === "PAID") return "status-paid";
      if(status === "CONFIRMED") return "status-confirmed";
      return "status";
  }

  function copyText(text){
      navigator.clipboard.writeText(text)
          .then(() => alert("Đã sao chép"))
          .catch(() => alert("Không sao chép được"));
  }

  async function loadDeposit(){
      const res = await fetch(`/api/deposits/${depositId}`, {
          headers:{ Authorization:"Bearer " + token }
      });

      const text = await res.text();
      if(!res.ok){
          detailEl.innerHTML = `<div class="cardx">Không tải được dữ liệu</div>`;
          return;
      }

      const d = JSON.parse(text);

      const transferContent = `DATCOC ${d.depositCode}`;

      const bankCode = d.bankCode || "MB";
      const bankAccount = d.bankAccount || "1234567899";
      const bankName = d.bankName || "MB BANK";
      const accountName = d.accountName || "DO AN J2EE";

      const qrUrl =
          `https://img.vietqr.io/image/${bankCode}-${bankAccount}-compact2.png` +
          `?amount=${Number(d.depositAmount)}` +
          `&addInfo=${encodeURIComponent(transferContent)}` +
          `&accountName=${encodeURIComponent(accountName)}`;

      const bikeImage = d.motorbikeImage && d.motorbikeImage.trim() !== ""
          ? d.motorbikeImage
          : "https://via.placeholder.com/900x600?text=No+Image";

      detailEl.innerHTML = `
          <div class="cardx">
              <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
                  <div class="bike-row">
                      <img class="bike-image" src="${bikeImage}" alt="${d.motorbikeName || 'bike'}"
                           onerror="this.src='https://via.placeholder.com/900x600?text=No+Image'">
                      <div>
                          <div class="title">${d.motorbikeName || "Xe không xác định"}</div>
                          <div class="muted">Mã cọc: ${d.depositCode}</div>
                          <div class="muted">Mã yêu cầu: ${d.requestCode}</div>
                          <div class="muted">Ngày tạo: ${formatDate(d.createdAt)}</div>
                      </div>
                  </div>
                  <div>
                      <span class="${statusClass(d.status)}">${statusLabel(d.status)}</span>
                  </div>
              </div>
          </div>

          <div class="cardx">
              <div class="grid">
                  <div class="mini">
                      <div class="label">Giá báo</div>
                      <div class="value">${formatCurrency(d.quotedPrice)}</div>
                  </div>
                  <div class="mini">
                      <div class="label">Số tiền cọc</div>
                      <div class="value">${formatCurrency(d.depositAmount)}</div>
                  </div>
                  <div class="mini">
                      <div class="label">Phương thức thanh toán</div>
                      <div class="value">${paymentMethodLabel(d.paymentMethod)}</div>
                  </div>
                  <div class="mini">
                      <div class="label">Trạng thái thanh toán</div>
                      <div class="value">${paymentStatusLabel(d.paymentStatus)}</div>
                  </div>
              </div>
          </div>

          <div class="cardx">
              <h4 class="mb-3">Thông tin chuyển khoản</h4>

              <div class="mb-4">
                  <div class="label">QR chuyển khoản</div>
                  <div class="qr-box">
                      <img src="${qrUrl}" alt="VietQR" class="qr-image"
                           onerror="this.src='https://via.placeholder.com/260?text=QR+Error'">
                  </div>
              </div>

              <div class="mb-3">
                  <div class="label">Ngân hàng</div>
                  <div class="copy-box">${bankName}</div>
              </div>

              <div class="mb-3">
                  <div class="label">Số tài khoản</div>
                  <div class="copy-box">${bankAccount}</div>
                  <button class="btn btn-sm btn-outline-light copy-btn" onclick="copyText('${bankAccount}')">Sao chép STK</button>
              </div>

              <div class="mb-3">
                  <div class="label">Chủ tài khoản</div>
                  <div class="copy-box">${accountName}</div>
              </div>

              <div class="mb-3">
                  <div class="label">Nội dung chuyển khoản</div>
                  <div class="copy-box">${transferContent}</div>
                  <button class="btn btn-sm btn-outline-light copy-btn" onclick="copyText('${transferContent}')">Sao chép nội dung</button>
              </div>

              ${d.status === "PENDING" ? `
                  <div class="mt-3 d-flex gap-2 flex-wrap">
                      <button class="btn-lux btn-lux-primary" onclick="markPaid()">Tôi đã chuyển khoản</button>
                      <a class="btn-lux" href="/customer/requests">Quay lại yêu cầu</a>
                  </div>
              ` : `
                  <div class="mt-3 muted">
                      Hệ thống đã ghi nhận. Showroom sẽ kiểm tra và xác nhận cọc cho anh.
                  </div>
              `}
          </div>
      `;
  }

  async function markPaid(){
      const res = await fetch(`/api/deposits/${depositId}/mark-paid`, {
          method:"PUT",
          headers:{ Authorization:"Bearer " + token }
      });

      const text = await res.text();
      if(!res.ok){
          alert(text || "Không thể cập nhật trạng thái thanh toán");
          return;
      }

      alert("Đã ghi nhận bạn đã chuyển khoản");
      loadDeposit();
  }

  if(!token){
      window.location.href = "/login";
  } else {
      loadDeposit();
  }
</script>
</body>
</html>
