<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg: #070a10;
            --bg-soft: #0b1018;
            --card: rgba(17, 24, 39, 0.82);
            --card-2: rgba(13, 18, 30, 0.92);
            --line: rgba(255,255,255,0.08);
            --text: #f8fafc;
            --muted: #a7b0bf;
            --accent: #2f6bff;
            --accent-2: #6fa2ff;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 24px 60px rgba(0,0,0,0.35);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "SF Pro Display", Inter, "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(47,107,255,0.16), transparent 24%),
                radial-gradient(circle at top right, rgba(47,107,255,0.08), transparent 22%),
                linear-gradient(180deg, #070a10 0%, #0a0f18 40%, #070a10 100%);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page-shell {
            width: min(1400px, calc(100% - 40px));
            margin: 28px auto 0;
            padding-bottom: 40px;
        }

        .profile-header {
            padding: 30px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(15,22,34,0.96), rgba(10,15,24,0.96));
            box-shadow: var(--shadow);
        }

        .profile-top {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 124px;
            height: 124px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
        }

        .profile-name {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 6px;
        }

        .profile-email {
            color: #cfd7e4;
            font-size: 1.05rem;
            margin-bottom: 12px;
        }

        .role-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .role-badge {
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 0.9rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1.15fr 0.75fr;
            gap: 26px;
            margin-top: 28px;
        }

        .panel {
            background: var(--card-2);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .panel-badge {
            color: #9aa7bc;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.84rem;
            margin-bottom: 10px;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 22px;
        }

        .avatar-box {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            margin-bottom: 24px;
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 900;
            overflow: hidden;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-upload {
            min-height: 46px;
            padding: 10px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        .form-label {
            color: #eef2ff;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-control {
            min-height: 50px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.10);
        }

        .form-control:focus {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 0 0.18rem rgba(47,107,255,0.18);
        }

        .action-btn {
            min-height: 50px;
            border-radius: 14px;
            border: 0;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #5e8fff);
            color: #fff;
            width: 100%;
        }

        .action-btn.secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.10);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 18px;
        }

        .stat-label {
            color: #9aa7bc;
            font-size: 0.92rem;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
        }

        .small-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 18px;
            margin-top: 18px;
        }

        .small-title {
            color: #9aa7bc;
            font-size: 0.92rem;
            margin-bottom: 8px;
        }

        .small-value {
            font-size: 1.12rem;
            font-weight: 800;
        }

        @media (max-width: 991.98px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 575.98px) {
            .page-shell {
                width: min(100% - 24px, 100%);
            }

            .profile-top,
            .avatar-box {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar('profile')"></div>

<main class="page-shell">
    <section class="profile-header">
        <div class="profile-top">
            <div class="profile-avatar" id="headerAvatar">N</div>

            <div>
                <div class="profile-name" id="profileFullName">Người dùng</div>
                <div class="profile-email" id="profileEmail">example@gmail.com</div>
                <div class="role-badges">
                    <span class="role-badge">user</span>
                    <span class="role-badge" id="loginTypeBadge">local</span>
                </div>
            </div>
        </div>
    </section>

    <section class="content-grid">
        <div class="panel">
            <div class="panel-badge">PROFILE_INFO_BADGE</div>
            <div class="panel-title">Thông tin cá nhân</div>

            <div class="avatar-box">
                <div class="avatar-preview" id="avatarPreview">N</div>
                <div>
                    <h4 style="font-weight: 800; margin-bottom: 8px;">Ảnh đại diện</h4>
                    <p style="color:#a7b0bf; margin-bottom: 14px;">Cập nhật ảnh đại diện cho tài khoản của bạn.</p>
                    <input type="file" id="avatarInput" accept="image/*" hidden>
                    <button class="btn-upload" type="button" onclick="document.getElementById('avatarInput').click()">
                        Chọn ảnh
                    </button>
                </div>
            </div>

            <form id="profileForm" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" id="fullNameInput" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" id="emailInput" class="form-control" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" id="phoneInput" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Đăng nhập bằng</label>
                    <input type="text" id="loginTypeInput" class="form-control" readonly>
                </div>

                <div class="col-12">
                    <button type="submit" class="action-btn">Lưu thông tin</button>
                </div>
            </form>
        </div>

        <div>
            <div class="panel">
                <div class="panel-badge">PROFILE_SECURITY_BADGE</div>
                <div class="panel-title">Trung tâm bảo mật</div>

                <form id="changePasswordForm" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Mật khẩu hiện tại</label>
                        <input type="password" id="currentPassword" class="form-control" placeholder="Nhập mật khẩu hiện tại">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Mật khẩu mới</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="Nhập mật khẩu mới">
                    </div>

                    <div class="col-12">
                        <button type="submit" class="action-btn">Đổi mật khẩu</button>
                    </div>
                </form>

                <div class="small-card">
                    <div class="small-title">Vai trò</div>
                    <div class="small-value">user</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Tổng đơn hàng</div>
                    <div class="stat-value" id="totalOrders">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Đang xử lý</div>
                    <div class="stat-value" id="pendingOrders" style="color: var(--warning)">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Hoàn thành</div>
                    <div class="stat-value" id="completedOrders" style="color: var(--success)">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Đã hủy</div>
                    <div class="stat-value" id="cancelledOrders" style="color: var(--danger)">0</div>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
    const token = localStorage.getItem("accessToken");

    if (!token) {
        window.location.href = "/login";
    }

    function safeText(value, fallback = "") {
        return value === null || value === undefined || value === "" ? fallback : value;
    }

    function getInitials(name) {
        if (!name) return "U";
        return name.trim().charAt(0).toUpperCase();
    }

    async function loadCustomerProfile() {
        try {
            const res = await fetch("/api/dashboard/customer", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.status === 401 || res.status === 403) {
                logout();
                return;
            }

            if (!res.ok) {
                throw new Error("Không tải được hồ sơ khách hàng");
            }

            const data = await res.json();

            const fullName = safeText(data.fullName, "Khách hàng");
            const email = safeText(data.email, "Chưa cập nhật email");
            const phone = safeText(data.phone, "Chưa cập nhật số điện thoại");
            const initials = getInitials(fullName);

            document.getElementById("profileFullName").innerText = fullName;
            document.getElementById("profileEmail").innerText = email;
            document.getElementById("fullNameInput").value = fullName;
            document.getElementById("emailInput").value = email;
            document.getElementById("phoneInput").value = phone;
            document.getElementById("loginTypeInput").value = "local";
            document.getElementById("loginTypeBadge").innerText = "local";

            document.getElementById("headerAvatar").innerText = initials;
            document.getElementById("avatarPreview").innerText = initials;

            document.getElementById("totalOrders").innerText = data.totalOrders ?? 0;
            document.getElementById("pendingOrders").innerText = data.pendingOrders ?? 0;
            document.getElementById("completedOrders").innerText = data.completedOrders ?? 0;
            document.getElementById("cancelledOrders").innerText = data.cancelledOrders ?? 0;
        } catch (err) {
            console.error(err);
            alert("Không thể tải dữ liệu hồ sơ khách hàng.");
        }
    }

    document.getElementById("profileForm").addEventListener("submit", function (e) {
        e.preventDefault();
        alert("Bạn cần nối API cập nhật hồ sơ ở bước tiếp theo.");
    });

    document.getElementById("changePasswordForm").addEventListener("submit", function (e) {
        e.preventDefault();
        alert("Bạn cần nối API đổi mật khẩu ở bước tiếp theo.");
    });

    document.getElementById("avatarInput").addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
            document.getElementById("avatarPreview").innerHTML = `<img src="${event.target.result}" alt="avatar">`;
        };
        reader.readAsDataURL(file);
    });

    function logout() {
        localStorage.removeItem("accessToken");
        localStorage.removeItem("refreshToken");
        localStorage.removeItem("token");
        localStorage.removeItem("fullName");
        localStorage.removeItem("username");
        localStorage.removeItem("name");
        window.location.href = "/login";
    }

    loadCustomerProfile();
</script>

</body>
</html>
