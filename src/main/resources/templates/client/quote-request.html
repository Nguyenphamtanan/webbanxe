<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Yêu cầu báo giá</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
        --bg: #070a10;
        --panel: rgba(17, 24, 39, 0.82);
        --panel-2: rgba(13, 18, 30, 0.92);
        --card: #111821;
        --line: rgba(255,255,255,0.08);
        --line-strong: rgba(255,255,255,0.14);
        --text: #f8fafc;
        --muted: #a7b0bf;
        --accent: #2f6bff;
        --accent-hover: #6fa2ff;
        --danger: #ef4444;
        --success: #22c55e;
        --shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        background:
            radial-gradient(circle at top left, rgba(47,107,255,0.10), transparent 24%),
            linear-gradient(180deg, #070a10 0%, #0a0f18 45%, #070a10 100%);
        color: var(--text);
        font-family: "SF Pro Display", Inter, "Segoe UI", Arial, sans-serif;
        min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    .page-shell {
        width: min(1400px, calc(100% - 40px));
        margin: 28px auto 0;
        padding-bottom: 40px;
    }

    .top-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 22px;
    }

    .btn-lux {
        min-height: 48px;
        padding: 11px 18px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.03);
        color: #fff;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: 0.25s ease;
        cursor: pointer;
    }

    .btn-lux:hover {
        background: rgba(255,255,255,0.06);
        border-color: var(--line-strong);
        color: #fff;
        transform: translateY(-1px);
    }

    .btn-lux-primary {
        background: linear-gradient(135deg, var(--accent), #5e8fff);
        border-color: transparent;
        box-shadow: 0 12px 28px rgba(47,107,255,0.28);
    }

    .btn-lux-primary:hover {
        background: linear-gradient(135deg, var(--accent-hover), #82adff);
        border-color: transparent;
    }

    .glass-box {
        background: rgba(19,26,34,0.88);
        border: 1px solid var(--line);
        border-radius: 24px;
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
    }

    .content-box { padding: 24px; }

    .bike-box {
        height: 100%;
        border: 1px solid var(--line);
        border-radius: 22px;
        overflow: hidden;
        background: rgba(255,255,255,0.02);
    }

    .bike-box img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        display: block;
        background: #0b1016;
    }

    .bike-body { padding: 18px; }
    .bike-name { font-size: 1.2rem; font-weight: 900; line-height: 1.5; margin-bottom: 8px; }
    .bike-meta { color: var(--muted); margin-bottom: 12px; line-height: 1.7; }
    .bike-price { font-size: 1.45rem; font-weight: 900; }

    .box-title {
        margin: 0 0 10px;
        font-size: 1.8rem;
        font-weight: 900;
        letter-spacing: -0.5px;
    }

    .box-subtitle {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.8;
    }

    .form-label {
        color: #dbe4ee;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .form-control,
    .form-select {
        min-height: 50px;
        border-radius: 14px;
        background: #0d1319;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.10);
    }

    .form-control::placeholder { color: #7f8a98; }

    .form-control:focus,
    .form-select:focus {
        background: #0d1319;
        color: #fff;
        border-color: var(--accent);
        box-shadow: 0 0 0 0.18rem rgba(47,107,255,0.18);
    }

    textarea.form-control {
        min-height: 140px;
        resize: vertical;
    }

    .alert-box {
        display: none;
        border-radius: 16px;
        padding: 14px 16px;
        margin-bottom: 18px;
        font-size: 0.95rem;
        border: 1px solid transparent;
    }

    .alert-error {
        background: rgba(239,68,68,0.12);
        color: #ffb4b4;
        border-color: rgba(239,68,68,0.28);
    }

    .alert-success {
        background: rgba(34,197,94,0.12);
        color: #b7f7c7;
        border-color: rgba(34,197,94,0.28);
    }

    .info-note {
        margin-top: 18px;
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--line);
        color: var(--muted);
        line-height: 1.8;
    }

    @media (max-width: 991.98px) {
        .bike-box img { height: 240px; }
    }

    @media (max-width: 575.98px) {
        .page-shell { width: min(100% - 24px, 100%); }
        .content-box { padding: 18px; }
        .btn-lux { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar('requests')"></div>

<div class="page-shell">
  <div class="top-actions">
    <a th:href="@{'/showroom/' + ${bike.slug}}" class="btn-lux">
      <i class="bi bi-arrow-left"></i>
      Quay lại chi tiết xe
    </a>

    <a href="/showroom" class="btn-lux">
      <i class="bi bi-grid"></i>
      Showroom
    </a>

    <a href="/customer/requests" class="btn-lux">
      <i class="bi bi-file-earmark-text"></i>
      Yêu cầu của tôi
    </a>
  </div>

  <div id="errorBox" class="alert-box alert-error"></div>
  <div id="successBox" class="alert-box alert-success"></div>

  <div class="glass-box content-box">
    <div class="row g-4">
      <div class="col-lg-5">
        <div class="bike-box">
          <img th:src="${bike.primaryImageUrl != null ? bike.primaryImageUrl : 'https://via.placeholder.com/900x600?text=No+Image'}"
               alt="motorbike">
          <div class="bike-body">
            <div class="bike-name" th:text="${bike.name}">Tên xe</div>
            <div class="bike-meta">
              <span th:text="${bike.brandName}">Brand</span>
              &nbsp;•&nbsp;
              <span th:text="${bike.categoryName}">Category</span>
              <br>
              SKU:
              <span th:text="${bike.sku}">SKU</span>
            </div>
            <div class="bike-price"
                 th:text="${#numbers.formatDecimal(bike.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
              0 đ
            </div>
          </div>
        </div>

        <div class="info-note">
          Nhân viên sẽ liên hệ để tư vấn chi tiết, xác nhận nhu cầu và gửi báo giá phù hợp cho mẫu xe anh đang quan tâm.
        </div>
      </div>

      <div class="col-lg-7">
        <h1 class="box-title">Yêu cầu báo giá</h1>
        <p class="box-subtitle">
          Điền thông tin để đội ngũ tư vấn liên hệ lại với anh sớm nhất.
        </p>

        <form id="quoteForm">
          <input type="hidden" id="motorbikeId" th:value="${bike.id}">
          <input type="hidden" id="requestType" value="QUOTE">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Họ và tên</label>
              <input type="text" id="fullName" class="form-control" placeholder="Nhập họ và tên">
            </div>

            <div class="col-md-6">
              <label class="form-label">Số điện thoại</label>
              <input type="text" id="phone" class="form-control" placeholder="Nhập số điện thoại">
            </div>

            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" id="email" class="form-control" placeholder="Nhập email">
            </div>

            <div class="col-md-6">
              <label class="form-label">Địa chỉ</label>
              <input type="text" id="address" class="form-control" placeholder="Nhập địa chỉ">
            </div>

            <div class="col-12">
              <label class="form-label">Ghi chú</label>
              <textarea id="note" class="form-control" placeholder="Ví dụ: Tôi muốn nhận báo giá lăn bánh, hỗ trợ trả góp, hoặc tư vấn thêm phiên bản phù hợp..."></textarea>
            </div>

            <div class="col-12 d-flex gap-2 flex-wrap pt-2">
              <button type="submit" class="btn-lux btn-lux-primary">
                <i class="bi bi-send"></i>
                Gửi yêu cầu báo giá
              </button>

              <a th:href="@{'/showroom/' + ${bike.slug}}" class="btn-lux">
                Hủy
              </a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  const token = localStorage.getItem("accessToken");
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  function showError(message) {
      errorBox.style.display = "block";
      successBox.style.display = "none";
      errorBox.innerText = message;
      window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function showSuccess(message) {
      successBox.style.display = "block";
      errorBox.style.display = "none";
      successBox.innerText = message;
      window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function clearAlert() {
      errorBox.style.display = "none";
      successBox.style.display = "none";
      errorBox.innerText = "";
      successBox.innerText = "";
  }

  if (!token) {
      window.location.href = "/login";
  }

  document.getElementById("quoteForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      clearAlert();

      const payload = {
          motorbikeId: Number(document.getElementById("motorbikeId").value),
          fullName: document.getElementById("fullName").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          email: document.getElementById("email").value.trim(),
          address: document.getElementById("address").value.trim(),
          note: document.getElementById("note").value.trim(),
          requestType: document.getElementById("requestType").value
      };

      if (!payload.fullName) {
          showError("Vui lòng nhập họ và tên");
          return;
      }

      if (!payload.phone) {
          showError("Vui lòng nhập số điện thoại");
          return;
      }

      try {
          const response = await fetch("/api/requests/quote", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + token
              },
              body: JSON.stringify(payload)
          });

          if (response.status === 401 || response.status === 403) {
              localStorage.removeItem("accessToken");
              localStorage.removeItem("refreshToken");
              window.location.href = "/login";
              return;
          }

          if (!response.ok) {
              const text = await response.text();
              throw new Error(text || "Không thể gửi yêu cầu báo giá");
          }

          await response.json();
          showSuccess("Đã gửi yêu cầu báo giá thành công");

          setTimeout(() => {
              window.location.href = "/customer/requests";
          }, 1200);
      } catch (err) {
          console.error(err);
          showError(err.message || "Có lỗi xảy ra khi gửi yêu cầu báo giá");
      }
  });
</script>
</body>
</html>
