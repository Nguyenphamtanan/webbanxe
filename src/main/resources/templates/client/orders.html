<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đơn hàng của tôi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
        --bg: #070a10;
        --card: rgba(17, 24, 39, 0.82);
        --card-2: rgba(13, 18, 30, 0.92);
        --line: rgba(255,255,255,0.08);
        --line-strong: rgba(255,255,255,0.14);
        --text: #f8fafc;
        --muted: #a7b0bf;
        --accent: #2f6bff;
        --accent-hover: #6fa2ff;
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;
        --shadow: 0 24px 60px rgba(0,0,0,0.35);
        --radius-lg: 22px;
        --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "SF Pro Display", Inter, "Segoe UI", Arial, sans-serif;
        background:
            radial-gradient(circle at top left, rgba(47,107,255,0.16), transparent 24%),
            radial-gradient(circle at top right, rgba(47,107,255,0.08), transparent 22%),
            linear-gradient(180deg, #070a10 0%, #0a0f18 40%, #070a10 100%);
    }

    .page-wrap {
        min-height: 100vh;
        width: min(1400px, calc(100% - 40px));
        margin: 28px auto 0;
        padding-bottom: 40px;
    }

    .orders-box {
        max-width: 1180px;
        margin: 0 auto;
    }

    .page-title {
        font-size: clamp(2.2rem, 4vw, 3.2rem);
        font-weight: 900;
        margin-bottom: 8px;
        letter-spacing: -1px;
    }

    .page-subtitle {
        color: var(--muted);
        margin-bottom: 28px;
        font-size: 1rem;
        line-height: 1.8;
    }

    .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 24px;
    }

    .btn-second {
        min-height: 48px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.04);
        color: #fff;
        border-radius: 14px;
        padding: 12px 18px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        transition: 0.2s ease;
        backdrop-filter: blur(8px);
    }

    .btn-second:hover {
        background: rgba(255,255,255,0.08);
        color: #fff;
        transform: translateY(-1px);
    }

    .alert-box {
        display: none;
        border-radius: 14px;
        padding: 12px 14px;
        margin-bottom: 18px;
        font-size: 0.95rem;
        background: rgba(255, 77, 79, 0.12);
        color: #ffb3b5;
        border: 1px solid rgba(255, 77, 79, 0.3);
    }

    .order-card {
        background: linear-gradient(180deg, rgba(18,24,34,0.98), rgba(12,17,24,0.98));
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 22px;
        margin-bottom: 18px;
        box-shadow: var(--shadow);
        transition: 0.25s ease;
    }

    .order-card:hover {
        border-color: rgba(47,107,255,0.28);
        transform: translateY(-2px);
    }

    .order-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 16px;
    }

    .order-code {
        font-size: 1.15rem;
        font-weight: 800;
    }

    .order-date {
        color: var(--muted);
        font-size: 0.95rem;
    }

    .order-total {
        font-size: 1.1rem;
        font-weight: 800;
        text-align: right;
    }

    .meta-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: 16px;
        margin-top: 16px;
    }

    .meta-item {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px 16px;
    }

    .meta-label {
        color: var(--muted);
        font-size: 0.92rem;
        margin-bottom: 8px;
    }

    .badge-status {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 700;
    }

    .status-pending,
    .status-confirmed,
    .status-shipping {
        background: rgba(245, 179, 1, 0.12);
        color: #ffd76a;
        border: 1px solid rgba(245, 179, 1, 0.25);
    }

    .status-completed,
    .status-paid {
        background: rgba(34, 197, 94, 0.12);
        color: #9ef0b9;
        border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .status-cancelled,
    .status-failed,
    .status-refunded,
    .status-unpaid {
        background: rgba(239, 68, 68, 0.12);
        color: #ffb3b5;
        border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .empty-box {
        text-align: center;
        padding: 60px 20px;
        background: linear-gradient(180deg, rgba(18,24,34,0.98), rgba(12,17,24,0.98));
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        color: var(--muted);
        box-shadow: var(--shadow);
    }

    .empty-box h3 {
        color: #fff;
        margin-bottom: 10px;
    }

    @media (max-width: 767.98px) {
        .meta-grid {
            grid-template-columns: 1fr;
        }

        .order-total {
            text-align: left;
        }
    }

    @media (max-width: 575.98px) {
        .page-wrap {
            width: min(100% - 24px, 100%);
        }
    }
    a {
    text-decoration: none;
    color: inherit;
}

.brand-mark,
.nav-text-link,
.nav-center-logo,
.nav-icon-btn,
.nav-pill-btn {
    text-decoration: none !important;
}

.brand-mark:hover,
.nav-text-link:hover,
.nav-center-logo:hover,
.nav-icon-btn:hover,
.nav-pill-btn:hover,
.brand-mark:focus,
.nav-text-link:focus,
.nav-center-logo:focus,
.nav-icon-btn:focus,
.nav-pill-btn:focus,
.brand-mark:visited,
.nav-text-link:visited,
.nav-center-logo:visited,
.nav-icon-btn:visited,
.nav-pill-btn:visited {
    text-decoration: none !important;
    color: inherit;
}
  </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar('orders')"></div>

<div class="page-wrap">
  <div class="orders-box">
    <h1 class="page-title">Đơn hàng của tôi</h1>
    <p class="page-subtitle">Theo dõi lịch sử đặt hàng và trạng thái thanh toán của bạn.</p>

    <div class="toolbar">

      <a href="/showroom" class="btn-second">
        <i class="bi bi-bag"></i>
        Tiếp tục mua sắm
      </a>
    </div>

    <div id="errorBox" class="alert-box"></div>
    <div id="ordersContainer"></div>
  </div>
</div>

<script>
  const token = localStorage.getItem("accessToken");
  const ordersContainer = document.getElementById("ordersContainer");
  const errorBox = document.getElementById("errorBox");

  if (!token) {
      window.location.href = "/login";
  }

  function showError(message) {
      errorBox.style.display = "block";
      errorBox.innerText = message;
  }

  function hideError() {
      errorBox.style.display = "none";
      errorBox.innerText = "";
  }

  function formatCurrency(value) {
      return new Intl.NumberFormat("vi-VN").format(Number(value || 0)) + " đ";
  }

  function formatDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      return date.toLocaleString("vi-VN");
  }

  function getStatusClass(status) {
      const value = (status || "").toUpperCase();

      if (["COMPLETED", "PAID"].includes(value)) return "status-completed";
      if (["PENDING", "CONFIRMED", "SHIPPING"].includes(value)) return "status-pending";
      if (["CANCELLED", "FAILED", "REFUNDED", "UNPAID"].includes(value)) return "status-cancelled";

      return "status-pending";
  }

  async function loadMyOrders() {
      hideError();

      try {
          const response = await fetch("/api/orders/my-orders", {
              method: "GET",
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (response.status === 401 || response.status === 403) {
              localStorage.removeItem("accessToken");
              localStorage.removeItem("refreshToken");
              window.location.href = "/login";
              return;
          }

          if (!response.ok) {
              const text = await response.text();
              throw new Error(text || "Không tải được danh sách đơn hàng");
          }

          const orders = await response.json();
          renderOrders(orders);

      } catch (error) {
          console.error(error);
          showError(error.message || "Có lỗi xảy ra khi tải đơn hàng");
      }
  }

  function renderOrders(orders) {
      if (!orders || !orders.length) {
          ordersContainer.innerHTML = `
              <div class="empty-box">
                  <h3>Bạn chưa có đơn hàng nào</h3>
                  <p>Hãy khám phá showroom và đặt chiếc xe bạn yêu thích.</p>
                  <div class="mt-4">
                      <a href="/showroom" class="btn-second">
                          <i class="bi bi-arrow-right"></i>
                          Đến showroom
                      </a>
                  </div>
              </div>
          `;
          return;
      }

      ordersContainer.innerHTML = orders.map(order => `
          <div class="order-card">
              <div class="order-top">
                  <div>
                      <div class="order-code">Mã đơn: ${order.orderCode}</div>
                      <div class="order-date">Ngày đặt: ${formatDate(order.createdAt)}</div>
                  </div>
                  <div class="order-total">${formatCurrency(order.totalAmount)}</div>
              </div>

              <div class="meta-grid">
                  <div class="meta-item">
                      <div class="meta-label">Trạng thái đơn hàng</div>
                      <span class="badge-status ${getStatusClass(order.status)}">${order.status}</span>
                  </div>

                  <div class="meta-item">
                      <div class="meta-label">Trạng thái thanh toán</div>
                      <span class="badge-status ${getStatusClass(order.paymentStatus)}">${order.paymentStatus}</span>
                  </div>

                  <div class="meta-item">
                      <div class="meta-label">Phương thức thanh toán</div>
                      <div>${order.paymentMethod}</div>
                  </div>

                  <div class="meta-item">
                      <div class="meta-label">Người nhận</div>
                      <div>${order.receiverName} - ${order.receiverPhone}</div>
                  </div>

                  <div class="meta-item" style="grid-column: 1 / -1;">
                      <div class="meta-label">Địa chỉ giao hàng</div>
                      <div>${order.shippingAddress}</div>
                  </div>
              </div>
          </div>
      `).join("");
  }

  loadMyOrders();
</script>
</body>
</html>
