<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đơn hàng của tôi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
        --bg: #0b0b0b;
        --card: #171717;
        --line: rgba(255,255,255,0.08);
        --text: #ffffff;
        --muted: #a8a8a8;
        --success: #1db954;
        --warning: #f5b301;
        --danger: #ff4d4f;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
    }

    .page-wrap {
        min-height: 100vh;
        padding: 32px 16px;
    }

    .orders-box {
        max-width: 1180px;
        margin: 0 auto;
    }

    .page-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 6px;
    }

    .page-subtitle {
        color: var(--muted);
        margin-bottom: 28px;
    }

    .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 24px;
    }

    .btn-second {
        border: 1px solid var(--line);
        background: transparent;
        color: #fff;
        border-radius: 14px;
        padding: 12px 16px;
        text-decoration: none;
        display: inline-block;
        font-weight: 600;
        transition: 0.2s ease;
    }

    .btn-second:hover {
        background: #fff;
        color: #000;
    }

    .alert-box {
        display: none;
        border-radius: 14px;
        padding: 12px 14px;
        margin-bottom: 18px;
        font-size: 0.95rem;
        background: rgba(255, 77, 79, 0.12);
        color: #ffb3b5;
        border: 1px solid rgba(255, 77, 79, 0.3);
    }

    .order-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 22px;
        margin-bottom: 18px;
    }

    .order-top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 16px;
    }

    .order-code {
        font-size: 1.15rem;
        font-weight: 800;
    }

    .order-date {
        color: var(--muted);
        font-size: 0.95rem;
    }

    .order-total {
        font-size: 1.1rem;
        font-weight: 800;
        text-align: right;
    }

    .meta-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: 16px;
        margin-top: 16px;
    }

    .meta-item {
        background: #101010;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px 16px;
    }

    .meta-label {
        color: var(--muted);
        font-size: 0.92rem;
        margin-bottom: 8px;
    }

    .badge-status {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 0.9rem;
        font-weight: 700;
    }

    .status-pending,
    .status-confirmed,
    .status-shipping {
        background: rgba(245, 179, 1, 0.12);
        color: #ffd76a;
        border: 1px solid rgba(245, 179, 1, 0.25);
    }

    .status-completed,
    .status-paid {
        background: rgba(29, 185, 84, 0.12);
        color: #9ef0b9;
        border: 1px solid rgba(29, 185, 84, 0.25);
    }

    .status-cancelled,
    .status-failed,
    .status-refunded,
    .status-unpaid {
        background: rgba(255, 77, 79, 0.12);
        color: #ffb3b5;
        border: 1px solid rgba(255, 77, 79, 0.25);
    }

    .empty-box {
        text-align: center;
        padding: 60px 20px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        color: var(--muted);
    }

    .empty-box h3 {
        color: #fff;
        margin-bottom: 10px;
    }

    @media (max-width: 767.98px) {
        .meta-grid {
            grid-template-columns: 1fr;
        }

        .order-total {
            text-align: left;
        }
    }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="orders-box">
    <h1 class="page-title">Đơn hàng của tôi</h1>
    <p class="page-subtitle">Theo dõi lịch sử đặt hàng và trạng thái thanh toán của bạn.</p>

    <div class="toolbar">
      <a href="/customer/dashboard" class="btn-second">Về dashboard</a>
      <a href="/showroom" class="btn-second">Tiếp tục mua sắm</a>
    </div>

    <div id="errorBox" class="alert-box"></div>
    <div id="ordersContainer"></div>
  </div>
</div>

<script>
  const token = localStorage.getItem("accessToken");
  const ordersContainer = document.getElementById("ordersContainer");
  const errorBox = document.getElementById("errorBox");

  if (!token) {
      window.location.href = "/login";
  }

  function showError(message) {
      errorBox.style.display = "block";
      errorBox.innerText = message;
  }

  function hideError() {
      errorBox.style.display = "none";
      errorBox.innerText = "";
  }

  function formatCurrency(value) {
      return new Intl.NumberFormat("vi-VN").format(Number(value || 0)) + " đ";
  }

  function formatDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      return date.toLocaleString("vi-VN");
  }

  function getStatusClass(status) {
      const value = (status || "").toUpperCase();

      if (["COMPLETED", "PAID"].includes(value)) return "status-completed";
      if (["PENDING", "CONFIRMED", "SHIPPING"].includes(value)) return "status-pending";
      if (["CANCELLED", "FAILED", "REFUNDED", "UNPAID"].includes(value)) return "status-cancelled";

      return "status-pending";
  }

  async function loadMyOrders() {
      hideError();

      try {
          const response = await fetch("/api/orders/my-orders", {
              method: "GET",
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (response.status === 401 || response.status === 403) {
              localStorage.removeItem("accessToken");
              localStorage.removeItem("refreshToken");
              window.location.href = "/login";
              return;
          }

          if (!response.ok) {
              const text = await response.text();
              throw new Error(text || "Không tải được danh sách đơn hàng");
          }

          const orders = await response.json();
          renderOrders(orders);

      } catch (error) {
          console.error(error);
          showError(error.message || "Có lỗi xảy ra khi tải đơn hàng");
      }
  }

  function renderOrders(orders) {
      if (!orders || !orders.length) {
          ordersContainer.innerHTML = `
              <div class="empty-box">
                  <h3>Bạn chưa có đơn hàng nào</h3>
                  <p>Hãy khám phá showroom và đặt chiếc xe bạn yêu thích.</p>
                  <div class="mt-4">
                      <a href="/showroom" class="btn-second">Đến showroom</a>
                  </div>
              </div>
          `;
          return;
      }

      ordersContainer.innerHTML = orders.map(order => `
          <div class="order-card">
              <div class="order-top">
                  <div>
                      <div class="order-code">Mã đơn: ${order.orderCode}</div>
                      <div class="order-date">Ngày đặt: ${formatDate(order.createdAt)}</div>
                  </div>
                  <div class="order-total">${formatCurrency(order.totalAmount)}</div>
              </div>

              <div class="meta-grid">
                  <div class="meta-item">
                      <div class="meta-label">Trạng thái đơn hàng</div>
                      <span class="badge-status ${getStatusClass(order.status)}">${order.status}</span>
                  </div>

                  <div class="meta-item">
                      <div class="meta-label">Trạng thái thanh toán</div>
                      <span class="badge-status ${getStatusClass(order.paymentStatus)}">${order.paymentStatus}</span>
                  </div>

                  <div class="meta-item">
                      <div class="meta-label">Phương thức thanh toán</div>
                      <div>${order.paymentMethod}</div>
                  </div>

                  <div class="meta-item">
                      <div class="meta-label">Người nhận</div>
                      <div>${order.receiverName} - ${order.receiverPhone}</div>
                  </div>

                  <div class="meta-item" style="grid-column: 1 / -1;">
                      <div class="meta-label">Địa chỉ giao hàng</div>
                      <div>${order.shippingAddress}</div>
                  </div>
              </div>
          </div>
      `).join("");
  }

  loadMyOrders();
</script>
</body>
</html>
