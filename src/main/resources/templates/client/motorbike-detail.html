<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết xe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0b0b0b; color:#fff; font-family:Arial,sans-serif; }
        .wrapper { max-width:1200px; margin:40px auto; }
        .box {
            background:#151515;
            border:1px solid rgba(255,255,255,0.08);
            border-radius:20px;
            padding:24px;
        }
        .main-img {
            width:100%;
            border-radius:16px;
            object-fit:cover;
            max-height:480px;
            background:#000;
        }
        .label { color:#aaa; margin-bottom:6px; }
        .price { font-size:2rem; font-weight:800; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="box">
        <div class="row g-4">
            <div class="col-lg-6">
                <img class="main-img"
                     th:src="${bike.primaryImageUrl != null ? bike.primaryImageUrl : 'https://via.placeholder.com/800x500?text=No+Image'}"
                     alt="motorbike">
            </div>

            <div class="col-lg-6">
                <h2 th:text="${bike.name}">Tên xe</h2>
                <div class="price mb-3"
                     th:text="${#numbers.formatDecimal(bike.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                    0 đ
                </div>

                <div class="mb-3">
                    <div class="label">Hãng</div>
                    <div th:text="${bike.brandName}">Brand</div>
                </div>

                <div class="mb-3">
                    <div class="label">Danh mục</div>
                    <div th:text="${bike.categoryName}">Category</div>
                </div>

                <div class="mb-3">
                    <div class="label">Động cơ</div>
                    <div th:text="${bike.engine}">Engine</div>
                </div>

                <div class="mb-3">
                    <div class="label">Khối lượng</div>
                    <div th:text="${bike.weightKg} + ' kg'">0 kg</div>
                </div>

                <div class="mb-4">
                    <div class="label">Mô tả</div>
                    <div th:text="${bike.description}">Mô tả</div>
                </div>

                <button class="btn btn-light me-2">Mua ngay</button>
                <button class="btn btn-outline-light">Thêm giỏ hàng</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
