<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý tồn kho</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#111;color:white">

<div class="container mt-4">
  <h2>Quản lý tồn kho</h2>

  <button class="btn btn-light mb-3" onclick="createStock()">+ Thêm tồn kho</button>

  <table class="table table-dark">
    <thead>
    <tr>
      <th>ID</th>
      <th>Kho</th>
      <th>Xe</th>
      <th>Số lượng</th>
      <th>CRUD</th>
    </tr>
    </thead>
    <tbody id="stockTable"></tbody>
  </table>
</div>

<script>
  const token = localStorage.getItem("accessToken");

  async function loadStocks(){
      const res = await fetch("/api/admin/stocks", {
          headers: { Authorization: "Bearer " + token }
      });

      const data = await res.json();

      document.getElementById("stockTable").innerHTML = data.map(s => `
          <tr>
              <td>${s.id}</td>
              <td>${s.warehouseName}</td>
              <td>${s.motorbikeName}</td>
              <td>${s.quantity}</td>
              <td>
                  <button onclick="updateStock(${s.id})">Sửa</button>
                  <button onclick="deleteStock(${s.id})">Xóa</button>
              </td>
          </tr>
      `).join('');
  }

  async function createStock(){
      const warehouseId = prompt("Warehouse ID");
      const motorbikeId = prompt("Motorbike ID");
      const quantity = prompt("Quantity");

      await fetch("/api/admin/stocks", {
          method:"POST",
          headers:{
              "Content-Type":"application/json",
              "Authorization":"Bearer " + token
          },
          body: JSON.stringify({ warehouseId, motorbikeId, quantity })
      });

      loadStocks();
  }

  async function updateStock(id){
      const quantity = prompt("New quantity");

      await fetch(`/api/admin/stocks/${id}`, {
          method:"PUT",
          headers:{
              "Content-Type":"application/json",
              "Authorization":"Bearer " + token
          },
          body: JSON.stringify({ quantity })
      });

      loadStocks();
  }

  async function deleteStock(id){
      await fetch(`/api/admin/stocks/${id}`, {
          method:"DELETE",
          headers:{ Authorization:"Bearer " + token }
      });

      loadStocks();
  }

  loadStocks();
</script>

</body>
</html>
