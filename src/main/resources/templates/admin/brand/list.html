<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý hãng xe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
        background: #0b0b0b;
        color: white;
        font-family: Arial, sans-serif;
    }

    .wrapper {
        max-width: 1100px;
        margin: 40px auto;
    }

    .card-box {
        background: #151515;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 24px;
    }

    .table {
        color: white;
    }

    .table thead th {
        color: #ddd;
        border-bottom-color: rgba(255,255,255,0.1);
    }

    .table td {
        border-bottom-color: rgba(255,255,255,0.06);
    }

    .btn-custom {
        border-radius: 10px;
    }

    .text-muted-custom {
        color: #a8a8a8;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2>Quản lý hãng xe</h2>
      <p class="text-muted-custom mb-0">Danh sách hãng trong hệ thống</p>
    </div>
    <div class="d-flex gap-2">
      <a href="/admin/dashboard" class="btn btn-outline-light btn-custom">Về dashboard</a>
      <button class="btn btn-light btn-custom" onclick="openCreateForm()">+ Thêm hãng</button>
    </div>
  </div>

  <div class="card-box">
    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
        <tr>
          <th>ID</th>
          <th>Tên hãng</th>
          <th>Slug</th>
          <th width="220">CRUD</th>
        </tr>
        </thead>
        <tbody id="brandTableBody">
        <tr>
          <td colspan="4" class="text-center text-muted-custom">Đang tải dữ liệu...</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem("accessToken");

  if (!token) {
      window.location.href = "/login";
  }

  async function loadBrands() {
      const tbody = document.getElementById("brandTableBody");

      try {
          const response = await fetch("/api/admin/brands", {
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (response.status === 401 || response.status === 403) {
              localStorage.removeItem("accessToken");
              localStorage.removeItem("refreshToken");
              window.location.href = "/login";
              return;
          }

          if (!response.ok) throw new Error("Không tải được hãng xe");

          const data = await response.json();

          if (!data.length) {
              tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted-custom">Chưa có hãng nào</td></tr>`;
              return;
          }

          tbody.innerHTML = data.map(item => `
              <tr>
                  <td>${item.id}</td>
                  <td>${item.name}</td>
                  <td>${item.slug}</td>
                  <td>
                      <button class="btn btn-sm btn-outline-warning me-2 btn-custom"
                              onclick="editBrand(${item.id}, '${item.name}', '${item.slug}')">Sửa</button>
                      <button class="btn btn-sm btn-outline-danger btn-custom"
                              onclick="deleteBrand(${item.id})">Xóa</button>
                  </td>
              </tr>
          `).join("");
      } catch (error) {
          console.error(error);
          tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Lỗi tải dữ liệu</td></tr>`;
      }
  }

  async function openCreateForm() {
      const name = prompt("Nhập tên hãng:");
      if (!name) return;

      const slug = prompt("Nhập slug hãng:");
      if (!slug) return;

      try {
          const response = await fetch("/api/admin/brands", {
              method: "POST",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + token
              },
              body: JSON.stringify({ name, slug })
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.message || "Thêm hãng thất bại");

          alert("Thêm hãng thành công");
          loadBrands();
      } catch (error) {
          alert(error.message);
      }
  }

  async function editBrand(id, oldName, oldSlug) {
      const name = prompt("Sửa tên hãng:", oldName);
      if (!name) return;

      const slug = prompt("Sửa slug hãng:", oldSlug);
      if (!slug) return;

      try {
          const response = await fetch(`/api/admin/brands/${id}`, {
              method: "PUT",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + token
              },
              body: JSON.stringify({ name, slug })
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.message || "Cập nhật hãng thất bại");

          alert("Cập nhật hãng thành công");
          loadBrands();
      } catch (error) {
          alert(error.message);
      }
  }

  async function deleteBrand(id) {
      if (!confirm("Bạn có chắc muốn xóa hãng này?")) return;

      try {
          const response = await fetch(`/api/admin/brands/${id}`, {
              method: "DELETE",
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (!response.ok) throw new Error("Xóa hãng thất bại");

          alert("Xóa hãng thành công");
          loadBrands();
      } catch (error) {
          alert(error.message);
      }
  }

  loadBrands();
</script>
</body>
</html>
