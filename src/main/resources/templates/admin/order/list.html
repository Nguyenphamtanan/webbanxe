<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý đơn hàng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
        background: #0b0b0b;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    .wrapper {
        max-width: 1300px;
        margin: 40px auto;
    }

    .card-box {
        background: #151515;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 24px;
    }

    .table {
        color: #fff;
    }

    .table thead th {
        color: #ddd;
        border-bottom-color: rgba(255,255,255,0.1);
        white-space: nowrap;
    }

    .table td {
        border-bottom-color: rgba(255,255,255,0.06);
        vertical-align: middle;
    }

    .status-badge {
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        display: inline-block;
    }

    .pending { background: #3d320a; color: #ffd95e; }
    .confirmed { background: #102e4a; color: #78c6ff; }
    .shipping { background: #2f2147; color: #d6a6ff; }
    .completed { background: #163d24; color: #7CFC98; }
    .cancelled { background: #3b1818; color: #ff8a8a; }

    .btn-custom {
        border-radius: 10px;
    }

    .modal-content {
        background: #151515;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.08);
    }

    .modal-header,
    .modal-footer {
        border-color: rgba(255,255,255,0.08);
    }

    .text-muted-custom {
        color: #a8a8a8;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2>Quản lý đơn hàng</h2>
      <p class="text-muted-custom mb-0">Danh sách đơn hàng trong hệ thống</p>
    </div>
    <a href="/admin/dashboard" class="btn btn-outline-light btn-custom">Về dashboard</a>
  </div>

  <div class="card-box">
    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
        <tr>
          <th>ID</th>
          <th>Mã đơn</th>
          <th>Khách hàng</th>
          <th>Người nhận</th>
          <th>SĐT</th>
          <th>Tổng tiền</th>
          <th>Thanh toán</th>
          <th>Trạng thái</th>
          <th>Ngày tạo</th>
          <th width="240">CRUD</th>
        </tr>
        </thead>
        <tbody id="orderTableBody">
        <tr>
          <td colspan="10" class="text-center text-muted-custom">Đang tải dữ liệu...</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="orderDetailModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Chi tiết đơn hàng</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="orderDetailBody">
        Đang tải...
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-light btn-custom" data-bs-dismiss="modal">Đóng</button>
      </div>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem("accessToken");

  if (!token) {
      window.location.href = "/login";
  }

  function getStatusClass(status) {
      switch (status) {
          case "PENDING": return "pending";
          case "CONFIRMED": return "confirmed";
          case "SHIPPING": return "shipping";
          case "COMPLETED": return "completed";
          case "CANCELLED": return "cancelled";
          default: return "";
      }
  }

  async function loadOrders() {
      const tbody = document.getElementById("orderTableBody");

      try {
          const response = await fetch("/api/admin/orders", {
              headers: { "Authorization": "Bearer " + token }
          });

          if (response.status === 401 || response.status === 403) {
              localStorage.removeItem("accessToken");
              localStorage.removeItem("refreshToken");
              window.location.href = "/login";
              return;
          }

          if (!response.ok) throw new Error("Không tải được danh sách đơn hàng");

          const data = await response.json();

          if (!data.length) {
              tbody.innerHTML = `<tr><td colspan="10" class="text-center text-muted-custom">Chưa có đơn hàng</td></tr>`;
              return;
          }

          tbody.innerHTML = data.map(order => `
              <tr>
                  <td>${order.id}</td>
                  <td>${order.orderCode ?? ""}</td>
                  <td>${order.customerName ?? ""}</td>
                  <td>${order.receiverName ?? ""}</td>
                  <td>${order.receiverPhone ?? ""}</td>
                  <td>${Number(order.totalAmount ?? 0).toLocaleString("vi-VN")} đ</td>
                  <td>${order.paymentMethod ?? ""} / ${order.paymentStatus ?? ""}</td>
                  <td><span class="status-badge ${getStatusClass(order.status)}">${order.status}</span></td>
                  <td>${order.createdAt ? new Date(order.createdAt).toLocaleString("vi-VN") : ""}</td>
                  <td>
                      <button class="btn btn-sm btn-outline-info btn-custom me-2"
                              onclick="viewOrderDetail(${order.id})">Chi tiết</button>
                      <button class="btn btn-sm btn-outline-warning btn-custom"
                              onclick="changeOrderStatus(${order.id}, '${order.status}')">Đổi trạng thái</button>
                  </td>
              </tr>
          `).join("");
      } catch (error) {
          console.error(error);
          tbody.innerHTML = `<tr><td colspan="10" class="text-center text-danger">Lỗi tải dữ liệu</td></tr>`;
      }
  }

  async function viewOrderDetail(id) {
      try {
          const response = await fetch(`/api/admin/orders/${id}`, {
              headers: { "Authorization": "Bearer " + token }
          });

          if (!response.ok) throw new Error("Không tải được chi tiết đơn hàng");

          const data = await response.json();

          const itemsHtml = (data.items || []).map(item => `
              <tr>
                  <td>${item.motorbikeName ?? ""}</td>
                  <td>${Number(item.unitPrice ?? 0).toLocaleString("vi-VN")} đ</td>
                  <td>${item.quantity ?? 0}</td>
                  <td>${Number(item.lineTotal ?? 0).toLocaleString("vi-VN")} đ</td>
              </tr>
          `).join("");

          document.getElementById("orderDetailBody").innerHTML = `
              <p><strong>Mã đơn:</strong> ${data.orderCode ?? ""}</p>
              <p><strong>Khách hàng:</strong> ${data.customerName ?? ""}</p>
              <p><strong>Người nhận:</strong> ${data.receiverName ?? ""}</p>
              <p><strong>Số điện thoại:</strong> ${data.receiverPhone ?? ""}</p>
              <p><strong>Địa chỉ:</strong> ${data.shippingAddress ?? ""}</p>
              <p><strong>Ghi chú:</strong> ${data.note ?? ""}</p>
              <p><strong>Trạng thái:</strong> ${data.status ?? ""}</p>
              <p><strong>Thanh toán:</strong> ${data.paymentMethod ?? ""} / ${data.paymentStatus ?? ""}</p>
              <p><strong>Tổng tiền:</strong> ${Number(data.totalAmount ?? 0).toLocaleString("vi-VN")} đ</p>

              <hr>
              <h6>Sản phẩm trong đơn</h6>
              <div class="table-responsive">
                  <table class="table table-dark table-bordered align-middle">
                      <thead>
                          <tr>
                              <th>Tên xe</th>
                              <th>Đơn giá</th>
                              <th>Số lượng</th>
                              <th>Thành tiền</th>
                          </tr>
                      </thead>
                      <tbody>
                          ${itemsHtml || `<tr><td colspan="4" class="text-center">Không có dữ liệu</td></tr>`}
                      </tbody>
                  </table>
              </div>
          `;

          const modal = new bootstrap.Modal(document.getElementById("orderDetailModal"));
          modal.show();
      } catch (error) {
          alert(error.message);
      }
  }

  async function changeOrderStatus(id, oldStatus) {
      const status = prompt("Nhập trạng thái mới (PENDING, CONFIRMED, SHIPPING, COMPLETED, CANCELLED):", oldStatus);
      if (!status) return;

      try {
          const response = await fetch(`/api/admin/orders/${id}/status`, {
              method: "PUT",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + token
              },
              body: JSON.stringify({ status })
          });

          const data = await response.json();

          if (!response.ok) throw new Error(data.message || "Cập nhật trạng thái thất bại");

          alert("Cập nhật trạng thái thành công");
          loadOrders();
      } catch (error) {
          alert(error.message);
      }
  }

  loadOrders();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
