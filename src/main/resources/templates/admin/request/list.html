<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý yêu cầu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg:#0a0f14;
            --card:#131a22;
            --line:rgba(255,255,255,0.08);
            --muted:#9ca3af;
            --accent:#2563eb;
        }

        body {
            background: var(--bg);
            color:#fff;
            font-family: "SF Pro Display", Inter, sans-serif;
        }

        .wrap {
            max-width:1300px;
            margin:40px auto;
            padding:0 16px;
        }

        .title {
            font-size:2.2rem;
            font-weight:900;
        }

        .sub {
            color:var(--muted);
            margin-bottom:24px;
        }

        .card-lux {
            background: var(--card);
            border:1px solid var(--line);
            border-radius:20px;
            padding:20px;
        }

        table {
            width:100%;
        }

        th, td {
            padding:14px;
            border-bottom:1px solid var(--line);
        }

        .muted {
            color:var(--muted);
            font-size:.9rem;
        }

        .bike-box {
            display:flex;
            gap:12px;
            align-items:center;
        }

        .bike-box img {
            width:70px;
            height:55px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid var(--line);
        }

        .badge-lux {
            padding:6px 10px;
            border-radius:999px;
            font-weight:700;
            font-size:.8rem;
        }

        .NEW { background:#1e40af; }
        .CONTACTED { background:#7c3aed; }
        .QUOTED { background:#f59e0b; }
        .APPROVED { background:#16a34a; }
        .REJECTED { background:#dc2626; }

        .btnx {
            padding:6px 10px;
            border-radius:10px;
            border:1px solid var(--line);
            background:transparent;
            color:#fff;
            font-size:.85rem;
        }

        .btnx:hover {
            background:#1f2937;
        }
    </style>
</head>
<body>

<div class="wrap">
    <h1 class="title">Quản lý yêu cầu</h1>
    <p class="sub">Xử lý báo giá và chuyển đổi khách hàng</p>

    <div class="card-lux">
        <table>
            <thead>
            <tr>
                <th>Xe</th>
                <th>Khách</th>
                <th>Trạng thái</th>
                <th>Giá báo</th>
                <th>Cọc</th>
                <th>Ngày</th>
                <th></th>
            </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    const token = localStorage.getItem("accessToken");
    const tbody = document.getElementById("tbody");

    function formatCurrency(v){
        if(!v) return "-";
        return new Intl.NumberFormat("vi-VN").format(v) + " đ";
    }

    function formatDate(v){
        return new Date(v).toLocaleString("vi-VN");
    }

    async function load(){
        const res = await fetch("/api/admin/requests", {
            headers:{Authorization:"Bearer "+token}
        });

        const data = await res.json();

        tbody.innerHTML = data.map(r => `
            <tr>

                <!-- XE -->
                <td>
                    <div class="bike-box">
                        <img src="${r.motorbikeImage || 'https://via.placeholder.com/120'}">
                        <div>
                            <div>${r.motorbikeName || '---'}</div>
                            <div class="muted">${r.requestCode}</div>
                        </div>
                    </div>
                </td>

                <!-- KHÁCH -->
                <td>
                    <div>${r.fullName}</div>
                    <div class="muted">${r.phone}</div>
                </td>

                <!-- STATUS -->
                <td>
                    <span class="badge-lux ${r.status}">
                        ${r.status}
                    </span>
                </td>

                <!-- PRICE -->
                <td>${formatCurrency(r.quotedPrice)}</td>
                <td>${formatCurrency(r.depositRequired)}</td>

                <!-- DATE -->
                <td class="muted">${formatDate(r.createdAt)}</td>

                <!-- ACTION -->
                <td>
                    <div style="display:flex; gap:6px; flex-wrap:wrap">


                        <button class="btnx" onclick="quote(${r.id})">
                            Báo giá
                        </button>

                        <button class="btnx" onclick="status(${r.id},'CONTACTED')">
                            Liên hệ
                        </button>

                    </div>
                </td>

            </tr>
        `).join("");
    }

    async function status(id, s){
        await fetch(`/api/admin/requests/${id}/status`,{
            method:"PUT",
            headers:{
                "Content-Type":"application/json",
                Authorization:"Bearer "+token
            },
            body:JSON.stringify({status:s})
        });
        load();
    }

    function quote(id){
        window.location.href = "/admin/requests/" + id;
    }

    load();
</script>

</body>
</html>
