<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết yêu cầu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
        background: #0b0f14;
        color: #fff;
        font-family: "SF Pro Display", Inter, sans-serif;
    }

    .container {
        max-width: 1000px;
        margin: 40px auto;
    }

    .card-lux {
        background: #121821;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 20px;
        margin-bottom: 20px;
    }

    .title {
        font-size: 1.8rem;
        font-weight: 900;
        margin-bottom: 10px;
    }

    .label {
        color: #9ca3af;
        font-size: 0.9rem;
    }

    .value {
        font-weight: 700;
    }

    .form-control {
        background: #0d1319;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-lux {
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: 700;
        border: none;
    }

    .btn-primary {
        background: #2563eb;
    }

    .btn-primary:hover {
        background: #1d4ed8;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="card-lux">
    <div class="title">Chi tiết yêu cầu</div>
    <div id="requestInfo">Đang tải...</div>
  </div>

  <div class="card-lux">
    <div class="title">Báo giá</div>

    <div class="mb-3">
      <label class="label">Giá báo</label>
      <input id="quotedPrice" class="form-control" type="number">
    </div>

    <div class="mb-3">
      <label class="label">Tiền cọc</label>
      <input id="depositRequired" class="form-control" type="number">
    </div>

    <div class="mb-3">
      <label class="label">Ghi chú</label>
      <textarea id="salesNote" class="form-control"></textarea>
    </div>

    <button class="btn-lux btn-primary" onclick="submitQuote()">
      Gửi báo giá
    </button>
  </div>

</div>

<script>
  const token = localStorage.getItem("accessToken");

  const requestId = window.location.pathname.split("/").pop();

  async function loadDetail() {
      const res = await fetch("/api/admin/requests/" + requestId, {
          headers: {
              "Authorization": "Bearer " + token
          }
      });

      const data = await res.json();

      document.getElementById("requestInfo").innerHTML = `
          <div><span class="label">Mã:</span> ${data.requestCode}</div>
          <div><span class="label">Khách:</span> ${data.fullName}</div>
          <div><span class="label">SĐT:</span> ${data.phone}</div>
          <div><span class="label">Email:</span> ${data.email || "-"}</div>
          <div><span class="label">Trạng thái:</span> ${data.status}</div>
      `;

      document.getElementById("quotedPrice").value = data.quotedPrice || "";
      document.getElementById("depositRequired").value = data.depositRequired || "";
      document.getElementById("salesNote").value = data.salesNote || "";
  }

  async function submitQuote() {
      const payload = {
          quotedPrice: Number(document.getElementById("quotedPrice").value),
          depositRequired: Number(document.getElementById("depositRequired").value),
          salesNote: document.getElementById("salesNote").value
      };

      const res = await fetch("/api/admin/requests/" + requestId + "/quote", {
          method: "PUT",
          headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + token
          },
          body: JSON.stringify(payload)
      });

      if (res.ok) {
          alert("Báo giá thành công");
          loadDetail();
      } else {
          alert("Lỗi báo giá");
      }
  }

  loadDetail();
</script>

</body>
</html>
