<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết yêu cầu báo giá</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
        background: #0b0f14;
        color: #fff;
        font-family: "SF Pro Display", Inter, sans-serif;
    }

    .container {
        max-width: 1100px;
        margin: 40px auto;
    }

    .card-lux {
        background: #121821;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 20px;
        margin-bottom: 20px;
    }

    .title {
        font-size: 1.8rem;
        font-weight: 900;
        margin-bottom: 10px;
    }

    .label {
        color: #9ca3af;
        font-size: 0.9rem;
        min-width: 150px;
        display: inline-block;
    }

    .value {
        font-weight: 700;
    }

    .form-control {
        background: #0d1319;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .form-control:focus {
        background: #0d1319;
        color: #fff;
        border-color: #2563eb;
        box-shadow: none;
    }

    .form-control:disabled {
        background: #111827;
        color: #9ca3af;
    }

    .btn-lux {
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: 700;
        border: none;
    }

    .btn-primary {
        background: #2563eb;
    }

    .btn-primary:hover {
        background: #1d4ed8;
    }

    .btn-outline-light {
        border-radius: 10px;
    }

    .badge-lux {
        padding: 6px 10px;
        border-radius: 999px;
        font-weight: 700;
        font-size: .8rem;
        display: inline-block;
    }

    .NEW { background:#1e40af; }
    .CONTACTED { background:#7c3aed; }
    .QUOTED { background:#f59e0b; color:#111; }
    .APPROVED { background:#16a34a; }
    .REJECTED { background:#dc2626; }

    .item-row {
        padding: 12px 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .item-row:last-child {
        border-bottom: none;
    }

    .muted {
        color: #9ca3af;
    }

    .hidden {
        display: none !important;
    }

    .section-note {
        color: #cbd5e1;
        font-size: .95rem;
        margin-top: 6px;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="d-flex justify-content-between align-items-start mb-3">
    <div>
      <h1 class="title mb-1">Chi tiết yêu cầu báo giá</h1>
      <div class="muted">Xem thông tin khách hàng, sản phẩm và gửi phản hồi báo giá</div>
    </div>

    <div class="d-flex gap-2">
      <a href="/admin/requests" class="btn btn-outline-light">Quay lại</a>
    </div>
  </div>

  <div class="card-lux">
    <div class="title">Thông tin yêu cầu</div>
    <div id="requestInfo">Đang tải...</div>
  </div>

  <div class="card-lux">
    <div class="title">Danh sách xe</div>
    <div id="requestItems">Đang tải...</div>
  </div>

  <div class="card-lux">
    <div class="title">Phản hồi yêu cầu</div>
    <div class="section-note">Admin nhập giá báo, tiền cọc và ghi chú để gửi mail phản hồi cho khách hàng.</div>

    <div class="mt-3 mb-3">
      <label class="label">Giá báo</label>
      <input id="quotedPrice" class="form-control" type="number">
    </div>

    <div class="mb-3">
      <label class="label">Tiền cọc</label>
      <input id="depositRequired" class="form-control" type="number">
    </div>

    <div class="mb-3">
      <label class="label">Nội dung phản hồi</label>
      <textarea id="salesNote" class="form-control" rows="4"></textarea>
    </div>

    <div class="d-flex gap-2 flex-wrap">
      <button class="btn-lux btn-primary" id="submitQuoteBtn" onclick="submitQuote()">
        Gửi báo giá
      </button>

      <button class="btn btn-outline-light" id="markContactedBtn" onclick="markContacted()">
        Đánh dấu đã liên hệ
      </button>
    </div>
  </div>

</div>

<script>
  const token = localStorage.getItem("accessToken");
  const requestId = window.location.pathname.split("/").pop();

  if (!token) {
      window.location.href = "/login";
  }

  function formatCurrency(v){
      if(v == null || v === "") return "-";
      return new Intl.NumberFormat("vi-VN").format(Number(v)) + " đ";
  }

  function formatDate(v){
      if(!v) return "-";
      return new Date(v).toLocaleString("vi-VN");
  }

  function statusBadge(status){
      return `<span class="badge-lux ${status}">${status}</span>`;
  }

  async function loadDetail() {
      try {
          const res = await fetch("/api/admin/requests/" + requestId, {
              headers: {
                  "Authorization": "Bearer " + token
              }
          });

          if (res.status === 401 || res.status === 403) {
              localStorage.removeItem("accessToken");
              localStorage.removeItem("refreshToken");
              window.location.href = "/login";
              return;
          }

          if (!res.ok) {
              const text = await res.text();
              throw new Error(text || "Không tải được chi tiết yêu cầu");
          }

          const data = await res.json();

          document.getElementById("requestInfo").innerHTML = `
              <div class="mb-2"><span class="label">Mã yêu cầu:</span> <span class="value">${data.requestCode || "-"}</span></div>
              <div class="mb-2"><span class="label">Khách hàng:</span> <span class="value">${data.fullName || "-"}</span></div>
              <div class="mb-2"><span class="label">Số điện thoại:</span> <span class="value">${data.phone || "-"}</span></div>
              <div class="mb-2"><span class="label">Email:</span> <span class="value">${data.email || "-"}</span></div>
              <div class="mb-2"><span class="label">Địa chỉ:</span> <span class="value">${data.address || "-"}</span></div>
              <div class="mb-2"><span class="label">Loại yêu cầu:</span> <span class="value">${data.requestType || "-"}</span></div>
              <div class="mb-2"><span class="label">Trạng thái:</span> ${statusBadge(data.status || "NEW")}</div>
              <div class="mb-2"><span class="label">Ghi chú khách:</span> <span class="value">${data.note || "-"}</span></div>
              <div class="mb-2"><span class="label">Ngày tạo:</span> <span class="value">${formatDate(data.createdAt)}</span></div>
              <div class="mb-0"><span class="label">Ngày cập nhật:</span> <span class="value">${formatDate(data.updatedAt)}</span></div>
          `;

          const items = data.items || [];
          document.getElementById("requestItems").innerHTML = items.length
              ? items.map(item => `
                  <div class="item-row">
                      <div><span class="label">Tên xe:</span> <span class="value">${item.motorbikeName || "-"}</span></div>
                      <div><span class="label">Slug:</span> <span class="value">${item.motorbikeSlug || "-"}</span></div>
                      <div><span class="label">Đơn giá:</span> <span class="value">${formatCurrency(item.unitPrice)}</span></div>
                      <div><span class="label">Số lượng:</span> <span class="value">${item.quantity ?? 0}</span></div>
                      <div><span class="label">Thành tiền:</span> <span class="value">${formatCurrency(item.lineTotal)}</span></div>
                  </div>
              `).join("")
              : `<div class="muted">Không có sản phẩm</div>`;

          document.getElementById("quotedPrice").value = data.quotedPrice || "";
          document.getElementById("depositRequired").value = data.depositRequired || "";
          document.getElementById("salesNote").value = data.salesNote || "";

          const canContact = data.status === "NEW";
          const canQuote = data.status === "NEW" || data.status === "CONTACTED";

          document.getElementById("markContactedBtn").classList.toggle("hidden", !canContact);
          document.getElementById("submitQuoteBtn").classList.toggle("hidden", !canQuote);

          document.getElementById("quotedPrice").disabled = !canQuote;
          document.getElementById("depositRequired").disabled = !canQuote;
          document.getElementById("salesNote").disabled = !canQuote;
      } catch (error) {
          console.error(error);
          alert(error.message || "Không tải được chi tiết");
      }
  }

  async function markContacted() {
      try {
          const res = await fetch("/api/admin/requests/" + requestId + "/status", {
              method: "PUT",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + token
              },
              body: JSON.stringify({
                  status: "CONTACTED",
                  salesNote: "Admin đã liên hệ khách hàng"
              })
          });

          if (!res.ok) {
              const text = await res.text();
              throw new Error(text || "Không cập nhật được trạng thái");
          }

          alert("Đã cập nhật trạng thái CONTACTED");
          loadDetail();
      } catch (error) {
          console.error(error);
          alert(error.message || "Lỗi cập nhật trạng thái");
      }
  }

  async function submitQuote() {
      const payload = {
          quotedPrice: Number(document.getElementById("quotedPrice").value || 0),
          depositRequired: Number(document.getElementById("depositRequired").value || 0),
          salesNote: document.getElementById("salesNote").value.trim()
      };

      try {
          const res = await fetch("/api/admin/requests/" + requestId + "/quote", {
              method: "PUT",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + token
              },
              body: JSON.stringify(payload)
          });

          if (!res.ok) {
              const text = await res.text();
              throw new Error(text || "Lỗi báo giá");
          }

          alert("Gửi báo giá thành công");
          loadDetail();
      } catch (error) {
          console.error(error);
          alert(error.message || "Lỗi báo giá");
      }
  }

  loadDetail();
</script>

</body>
</html>
