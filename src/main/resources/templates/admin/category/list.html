<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0b0b; color: white; font-family: Arial, sans-serif; }
        .wrapper { max-width: 1100px; margin: 40px auto; }
        .card-box {
            background: #151515;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
        }
        .table {
            color: white;
        }
        .table thead th {
            color: #ddd;
            border-bottom-color: rgba(255,255,255,0.1);
        }
        .table td {
            border-bottom-color: rgba(255,255,255,0.06);
        }
        .btn-custom {
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Quản lý danh mục</h2>
            <p class="text-secondary mb-0">Danh sách các danh mục sản phẩm</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/admin/dashboard" class="btn btn-outline-light btn-custom">Về dashboard</a>
            <button class="btn btn-light btn-custom" onclick="openCreateForm()">+ Thêm danh mục</button>
        </div>
    </div>

    <div class="card-box">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên danh mục</th>
                    <th>Slug</th>
                    <th width="220">CRUD</th>
                </tr>
                </thead>
                <tbody id="categoryTableBody">
                <tr>
                    <td colspan="4" class="text-center text-secondary">Đang tải dữ liệu...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem("accessToken");

    if (!token) {
        window.location.href = "/login";
    }

    async function loadCategories() {
        const tbody = document.getElementById("categoryTableBody");

        try {
            const response = await fetch("/api/admin/categories", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem("accessToken");
                localStorage.removeItem("refreshToken");
                window.location.href = "/login";
                return;
            }

            if (!response.ok) throw new Error("Không tải được danh mục");

            const data = await response.json();

            if (!data.length) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-secondary">Chưa có danh mục</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.name}</td>
                    <td>${item.slug}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning me-2 btn-custom" onclick="editCategory(${item.id}, '${item.name}', '${item.slug}')">Sửa</button>
                        <button class="btn btn-sm btn-outline-danger btn-custom" onclick="deleteCategory(${item.id})">Xóa</button>
                    </td>
                </tr>
            `).join("");
        } catch (error) {
            console.error(error);
            tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Lỗi tải dữ liệu</td></tr>`;
        }
    }

    async function openCreateForm() {
        const name = prompt("Nhập tên danh mục:");
        if (!name) return;

        const slug = prompt("Nhập slug danh mục:");
        if (!slug) return;

        try {
            const response = await fetch("/api/admin/categories", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ name, slug })
            });

            const data = await response.json();

            if (!response.ok) throw new Error(data.message || "Thêm danh mục thất bại");

            alert("Thêm danh mục thành công");
            loadCategories();
        } catch (error) {
            alert(error.message);
        }
    }

    async function editCategory(id, oldName, oldSlug) {
        const name = prompt("Sửa tên danh mục:", oldName);
        if (!name) return;

        const slug = prompt("Sửa slug danh mục:", oldSlug);
        if (!slug) return;

        try {
            const response = await fetch(`/api/admin/categories/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ name, slug })
            });

            const data = await response.json();

            if (!response.ok) throw new Error(data.message || "Cập nhật thất bại");

            alert("Cập nhật thành công");
            loadCategories();
        } catch (error) {
            alert(error.message);
        }
    }

    async function deleteCategory(id) {
        if (!confirm("Bạn có chắc muốn xóa danh mục này?")) return;

        try {
            const response = await fetch(`/api/admin/categories/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!response.ok) throw new Error("Xóa thất bại");

            alert("Xóa thành công");
            loadCategories();
        } catch (error) {
            alert(error.message);
        }
    }

    loadCategories();
</script>
</body>
</html>
</html>
