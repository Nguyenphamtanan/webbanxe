<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết xe máy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --honda-red: #c40000;
            --honda-red-dark: #a80000;
            --bg-light: #f7f7f7;
            --text-muted: #777;
        }

        body {
            margin: 0;
            background: var(--bg-light);
            font-family: Arial, sans-serif;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 270px;
            background: linear-gradient(180deg, var(--honda-red), var(--honda-red-dark));
            color: white;
            padding: 24px 18px;
            flex-shrink: 0;
        }

        .sidebar-brand {
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 10px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sidebar a.active,
        .sidebar a:hover {
            background: rgba(255,255,255,0.16);
        }

        .main-content {
            flex: 1;
        }

        .topbar {
            background: #fff;
            border-bottom: 3px solid var(--honda-red);
            padding: 20px 28px;
        }

        .topbar h2 {
            margin: 0;
            color: var(--honda-red);
            font-weight: 800;
            text-transform: uppercase;
        }

        .content-body {
            padding: 28px;
        }

        .card-box {
            border: none;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 8px 22px rgba(0,0,0,0.06);
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .preview-img {
            width: 100%;
            max-width: 380px;
            border-radius: 14px;
            border: 1px solid #ddd;
        }

        .btn-honda {
            background: var(--honda-red);
            color: #fff;
            border: none;
            font-weight: 600;
        }

        .btn-honda:hover {
            background: var(--honda-red-dark);
            color: #fff;
        }

        @media (max-width: 992px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-brand">Honda Admin</div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/motorbike" class="active">Quản lý xe máy</a>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <h2>Chi tiết xe máy</h2>
            <div class="text-muted">Thông tin đầy đủ của sản phẩm</div>
        </div>

        <div class="content-body">
            <div class="card card-box">
                <div class="card-body p-4">
                    <div class="row g-4">
                        <div class="col-lg-5">
                            <img id="productImage" class="preview-img" src="https://via.placeholder.com/380x260?text=No+Image" alt="Ảnh xe">
                        </div>

                        <div class="col-lg-7">
                            <div class="detail-label">Tên xe</div>
                            <div class="detail-value" id="name"></div>

                            <div class="detail-label">Slug</div>
                            <div class="detail-value" id="slug"></div>

                            <div class="detail-label">SKU</div>
                            <div class="detail-value" id="sku"></div>

                            <div class="detail-label">Giá</div>
                            <div class="detail-value" id="price"></div>

                            <div class="detail-label">ID hãng</div>
                            <div class="detail-value" id="brandId"></div>

                            <div class="detail-label">ID danh mục</div>
                            <div class="detail-value" id="categoryId"></div>

                            <div class="detail-label">Trạng thái</div>
                            <div class="detail-value" id="isActive"></div>

                            <div class="detail-label">Mô tả</div>
                            <div class="detail-value" id="description"></div>

                            <div class="d-flex gap-2 mt-3">
                                <a id="editBtn" href="#" class="btn btn-honda">Sửa sản phẩm</a>
                                <a href="/admin/motorbikes" class="btn btn-outline-secondary">Quay lại</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const token = localStorage.getItem("accessToken");
    if (!token) window.location.href = "/login";

    const pathParts = window.location.pathname.split("/");
    const id = pathParts[pathParts.length - 1];

    async function loadDetail() {
        try {
            const response = await fetch(`/api/admin/motorbikes/${id}`, {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (response.status === 401 || response.status === 403) {
                logout();
                return;
            }

            if (!response.ok) throw new Error("Không thể tải dữ liệu");

            const data = await response.json();

            document.getElementById("name").innerText = data.name ?? "";
            document.getElementById("slug").innerText = data.slug ?? "";
            document.getElementById("sku").innerText = data.sku ?? "";
            document.getElementById("price").innerText = Number(data.price ?? 0).toLocaleString("vi-VN") + " đ";
            document.getElementById("brandId").innerText = data.brandId ?? "";
            document.getElementById("categoryId").innerText = data.categoryId ?? "";
            document.getElementById("description").innerText = data.description ?? "";
            document.getElementById("isActive").innerText = data.isActive ? "Hiển thị" : "Ẩn";
            document.getElementById("productImage").src = data.primaryImageUrl || "https://via.placeholder.com/380x260?text=No+Image";
            document.getElementById("editBtn").href = `/admin/motorbike/edit/${id}`;
        } catch (error) {
            console.error(error);
            alert("Không tải được chi tiết sản phẩm");
        }
    }

    function logout() {
        localStorage.removeItem("accessToken");
        localStorage.removeItem("refreshToken");
        window.location.href = "/login";
    }

    loadDetail();
</script>
</body>
</html>
