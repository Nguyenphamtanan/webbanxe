<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm xe mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --honda-red: #c40000;
            --honda-red-dark: #a80000;
            --text-muted: #777;
            --bg-light: #f7f7f7;
        }

        body {
            margin: 0;
            background: var(--bg-light);
            font-family: Arial, sans-serif;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 270px;
            background: linear-gradient(180deg, var(--honda-red), var(--honda-red-dark));
            color: #fff;
            padding: 24px 18px;
            flex-shrink: 0;
        }

        .sidebar-brand {
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .sidebar-subtitle {
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 28px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
        }

        .sidebar-menu li {
            margin-bottom: 10px;
        }

        .sidebar-menu a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 10px;
            font-weight: 600;
        }

        .sidebar-menu a.active,
        .sidebar-menu a:hover {
            background: rgba(255,255,255,0.16);
        }

        .main-content {
            flex: 1;
        }

        .topbar {
            background: #fff;
            border-bottom: 3px solid var(--honda-red);
            padding: 20px 28px;
        }

        .topbar h2 {
            margin: 0;
            color: var(--honda-red);
            font-weight: 800;
            text-transform: uppercase;
        }

        .content-body {
            padding: 28px;
        }

        .card-box {
            border: none;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 8px 22px rgba(0,0,0,0.06);
        }

        .btn-honda {
            background: var(--honda-red);
            color: #fff;
            border: none;
            font-weight: 600;
        }

        .btn-honda:hover {
            background: var(--honda-red-dark);
            color: #fff;
        }

        .preview-img {
            width: 220px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: #fafafa;
        }

        .form-label {
            font-weight: 600;
        }

        .note {
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 992px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-brand">Honda Admin</div>
        <div class="sidebar-subtitle">Quản trị hệ thống bán xe máy</div>
        <ul class="sidebar-menu">
            <li><a href="/admin/dashboard">Dashboard</a></li>
            <li><a href="/admin/motorbike" class="active">Quản lý xe máy</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <h2>Thêm xe mới</h2>
            <div class="text-muted">Tạo sản phẩm xe máy mới trong hệ thống</div>
        </div>

        <div class="content-body">
            <div class="card card-box">
                <div class="card-body p-4">
                    <form id="createForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Tên xe</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Slug</label>
                                <input type="text" class="form-control" id="slug" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">SKU</label>
                                <input type="text" class="form-control" id="sku" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Giá</label>
                                <input type="number" class="form-control" id="price" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">ID hãng</label>
                                <input type="number" class="form-control" id="brandId" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">ID danh mục</label>
                                <input type="number" class="form-control" id="categoryId" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Ảnh chính (URL)</label>
                                <input type="text" class="form-control" id="primaryImageUrl" oninput="previewImage()">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Trạng thái</label>
                                <select class="form-select" id="isActive">
                                    <option value="true">Hiển thị</option>
                                    <option value="false">Ẩn</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Mô tả</label>
                                <textarea class="form-control" id="description" rows="5"></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Xem trước ảnh</label>
                                <div>
                                    <img id="imagePreview" class="preview-img" src="https://via.placeholder.com/220x150?text=Preview" alt="preview">
                                </div>
                                <div class="note mt-2">Tạm thời đang dùng URL ảnh. Sau này có thể nâng cấp sang upload file.</div>
                            </div>

                            <div class="col-12 d-flex gap-2">
                                <button type="submit" class="btn btn-honda">Lưu sản phẩm</button>
                                <a href="/admin/motorbikes" class="btn btn-outline-secondary">Quay lại</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const token = localStorage.getItem("accessToken");
    if (!token) window.location.href = "/login";

    function previewImage() {
        const url = document.getElementById("primaryImageUrl").value.trim();
        document.getElementById("imagePreview").src = url || "https://via.placeholder.com/220x150?text=Preview";
    }

    document.getElementById("createForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const payload = {
            name: document.getElementById("name").value.trim(),
            slug: document.getElementById("slug").value.trim(),
            sku: document.getElementById("sku").value.trim(),
            price: Number(document.getElementById("price").value || 0),
            brandId: Number(document.getElementById("brandId").value || 0),
            categoryId: Number(document.getElementById("categoryId").value || 0),
            primaryImageUrl: document.getElementById("primaryImageUrl").value.trim(),
            description: document.getElementById("description").value.trim(),
            isActive: document.getElementById("isActive").value === "true"
        };

        try {
            const response = await fetch("/api/admin/motorbikes", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(payload)
            });

            if (response.status === 401 || response.status === 403) {
                logout();
                return;
            }

            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || "Tạo sản phẩm thất bại");
            }

            alert("Thêm sản phẩm thành công");
            window.location.href = "/admin/motorbike";
        } catch (error) {
            console.error(error);
            alert(error.message || "Có lỗi xảy ra");
        }
    });

    function logout() {
        localStorage.removeItem("accessToken");
        localStorage.removeItem("refreshToken");
        window.location.href = "/login";
    }
</script>
</body>
</html>
