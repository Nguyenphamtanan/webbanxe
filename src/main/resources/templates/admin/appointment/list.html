<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý lịch hẹn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
        --bg:#0a0f14;
        --card:#131a22;
        --line:rgba(255,255,255,.08);
        --muted:#9ca3af;
    }

    body{
        background:var(--bg);
        color:#fff;
        font-family:"SF Pro Display", Inter, sans-serif;
    }

    .wrap{
        max-width:1320px;
        margin:40px auto;
        padding:0 16px;
    }

    .title{
        font-size:2.2rem;
        font-weight:900;
    }

    .sub{
        color:var(--muted);
        margin-bottom:24px;
    }

    .cardx{
        background:var(--card);
        border:1px solid var(--line);
        border-radius:20px;
        padding:20px;
    }

    table{
        width:100%;
    }

    th,td{
        padding:14px;
        border-bottom:1px solid var(--line);
        vertical-align:top;
    }

    .muted{
        color:var(--muted);
        font-size:.9rem;
    }

    .badge-lux{
        padding:6px 10px;
        border-radius:999px;
        font-weight:700;
        font-size:.8rem;
        display:inline-block;
    }

    .PENDING{
        background:#92400e;
        color:#fde68a;
    }

    .CONFIRMED{
        background:#1d4ed8;
        color:#bfdbfe;
    }

    .COMPLETED{
        background:#166534;
        color:#bbf7d0;
    }

    .CANCELLED{
        background:#991b1b;
        color:#fecaca;
    }

    .btnx{
        padding:8px 12px;
        border-radius:10px;
        border:1px solid var(--line);
        background:transparent;
        color:#fff;
        font-size:.85rem;
    }

    .btnx:hover{
        background:#1f2937;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="d-flex justify-content-between align-items-start mb-3">
    <div>
      <h1 class="title">Quản lý lịch hẹn</h1>
      <p class="sub">Xem và xử lý các lịch hẹn xem xe / tư vấn tại showroom</p>
    </div>
    <a href="/admin/dashboard" class="btn btn-outline-light">Dashboard</a>
  </div>

  <div class="cardx">
    <table>
      <thead>
      <tr>
        <th>Mã lịch</th>
        <th>Khách hàng</th>
        <th>Xe</th>
        <th>Thời gian hẹn</th>
        <th>Trạng thái</th>
        <th>Ngày tạo</th>
        <th>Thao tác</th>
      </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const token = localStorage.getItem("accessToken");
  const tbody = document.getElementById("tbody");

  if (!token) window.location.href = "/login";

  function formatDate(v){
      if(!v) return "-";
      return new Date(v).toLocaleString("vi-VN");
  }

  async function loadAppointments(){
      try{
          const res = await fetch("/api/admin/appointments", {
              headers: { Authorization: "Bearer " + token }
          });

          if(res.status === 401 || res.status === 403){
              localStorage.removeItem("accessToken");
              localStorage.removeItem("refreshToken");
              window.location.href = "/login";
              return;
          }

          if(!res.ok) throw new Error("Không tải được lịch hẹn");

          const data = await res.json();

          if(!data.length){
              tbody.innerHTML = `<tr><td colspan="7" class="muted">Chưa có lịch hẹn</td></tr>`;
              return;
          }

          tbody.innerHTML = data.map(a => `
              <tr>
                  <td><div>${a.appointmentCode || "-"}</div></td>
                  <td>
                      <div>${a.customerName || "-"}</div>
                      <div class="muted">${a.phone || "-"}</div>
                  </td>
                  <td>${a.motorbikeName || "-"}</td>
                  <td>${formatDate(a.appointmentTime)}</td>
                  <td><span class="badge-lux ${a.status}">${a.status}</span></td>
                  <td class="muted">${formatDate(a.createdAt)}</td>
                  <td>
                      <div style="display:flex; gap:6px; flex-wrap:wrap">
                          <button class="btnx" onclick="viewDetail(${a.id})">Chi tiết</button>

                          ${a.status === "PENDING"
                              ? `<button class="btnx" onclick="updateStatus(${a.id}, 'CONFIRMED')">Xác nhận</button>`
                              : ""
                          }

                          ${a.status === "CONFIRMED"
                              ? `<button class="btnx" onclick="updateStatus(${a.id}, 'COMPLETED')">Hoàn tất</button>`
                              : ""
                          }

                          ${(a.status === "PENDING" || a.status === "CONFIRMED")
                              ? `<button class="btnx" onclick="updateStatus(${a.id}, 'CANCELLED')">Hủy</button>`
                              : ""
                          }
                      </div>
                  </td>
              </tr>
          `).join("");
      }catch(error){
          console.error(error);
          tbody.innerHTML = `<tr><td colspan="7">Lỗi tải dữ liệu</td></tr>`;
      }
  }

  async function updateStatus(id, status){
      try{
          const res = await fetch(`/api/admin/appointments/${id}/status`, {
              method: "PUT",
              headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + token
              },
              body: JSON.stringify({ status })
          });

          if(!res.ok){
              const text = await res.text();
              throw new Error(text || "Cập nhật thất bại");
          }

          alert("Cập nhật trạng thái thành công");
          loadAppointments();
      }catch(error){
          console.error(error);
          alert(error.message || "Lỗi cập nhật");
      }
  }

  function viewDetail(id){
      window.location.href = "/admin/appointments/" + id;
  }

  loadAppointments();
</script>
</body>
</html>
