<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý người dùng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
        background: #0b0b0b;
        color: white;
        font-family: Arial;
    }

    .wrapper {
        max-width: 1200px;
        margin: 40px auto;
    }

    .card-box {
        background: #151515;
        border-radius: 16px;
        padding: 24px;
    }

    .table {
        color: white;
    }

    .badge-active {
        color: #7CFC98;
    }

    .badge-lock {
        color: #ff6b6b;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="d-flex justify-content-between mb-4">
    <h2>Quản lý người dùng</h2>
    <a href="/admin/dashboard" class="btn btn-outline-light">Dashboard</a>
  </div>

  <div class="card-box">
    <table class="table">
      <thead>
      <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Username</th>
        <th>Role</th>
        <th>Trạng thái</th>
        <th>Hành động</th>
      </tr>
      </thead>

      <tbody id="userTable">
      <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  const token = localStorage.getItem("accessToken");

  if (!token) {
      window.location.href = "/login";
  }

  async function loadUsers() {
      const res = await fetch("/api/admin/users", {
          headers: { Authorization: "Bearer " + token }
      });

      const data = await res.json();

      const html = data.map(u => `
          <tr>
              <td>${u.id}</td>
              <td>${u.email ?? ''}</td>
              <td>${u.username}</td>
              <td>${u.role}</td>
              <td>
                  ${u.isActive
                      ? '<span class="badge-active">Hoạt động</span>'
                      : '<span class="badge-lock">Đã khóa</span>'}
              </td>
              <td>
                  <button onclick="toggle(${u.id}, ${u.isActive})" class="btn btn-sm btn-warning">
                      ${u.isActive ? 'Khóa' : 'Mở'}
                  </button>

                  <button onclick="changeRole(${u.id})" class="btn btn-sm btn-info">
                      Đổi role
                  </button>
              </td>
          </tr>
      `).join("");

      document.getElementById("userTable").innerHTML = html;
  }

  async function toggle(id, current) {
      await fetch(`/api/admin/users/${id}/status?isActive=${!current}`, {
          method: "PUT",
          headers: { Authorization: "Bearer " + token }
      });
      loadUsers();
  }

  async function changeRole(id) {
      const role = prompt("Nhập role (ADMIN / STAFF / CUSTOMER):");

      if (!role) return;

      await fetch(`/api/admin/users/${id}/role?role=${role}`, {
          method: "PUT",
          headers: { Authorization: "Bearer " + token }
      });

      loadUsers();
  }

  loadUsers();
</script>

</body>
</html>
