spring:
  config:
    import: optional:application-secret.yml

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=QLVehicles;encrypt=true;trustServerCertificate=true
    username: thu
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

  thymeleaf:
    cache: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

server:
  port: 8080

jwt:
  secret: yourSecretKeyYourSecretKeyYourSecretKey123456
  expiration: 86400000
  refresh-expiration: 604800000